<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="1100" height="620" fill="#f8fafc"/>
  <text x="550" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Container Image Layers</text>
  <text x="550" y="60" text-anchor="middle" font-size="13" fill="#475569">Each Dockerfile instruction creates a layer. Layers are read-only and cached.</text>

  <!-- Dockerfile -->
  <g filter="url(#sh)">
    <rect x="60" y="100" width="380" height="380" rx="10" fill="#1e293b" stroke="#020617" stroke-width="2"/>
    <text x="80" y="125" font-size="13" font-weight="700" fill="#fbbf24">Dockerfile</text>
    <text x="80" y="155" font-size="13" fill="#86efac" font-family="Consolas, monospace">FROM ubuntu:22.04</text>
    <text x="80" y="195" font-size="13" fill="#86efac" font-family="Consolas, monospace">RUN apt-get install nodejs</text>
    <text x="80" y="235" font-size="13" fill="#86efac" font-family="Consolas, monospace">WORKDIR /app</text>
    <text x="80" y="275" font-size="13" fill="#86efac" font-family="Consolas, monospace">COPY package.json .</text>
    <text x="80" y="315" font-size="13" fill="#86efac" font-family="Consolas, monospace">RUN npm install</text>
    <text x="80" y="355" font-size="13" fill="#86efac" font-family="Consolas, monospace">COPY . .</text>
    <text x="80" y="395" font-size="13" fill="#86efac" font-family="Consolas, monospace">EXPOSE 3000</text>
    <text x="80" y="435" font-size="13" fill="#86efac" font-family="Consolas, monospace">CMD ["node", "server.js"]</text>
    <text x="80" y="465" font-size="10" fill="#94a3b8" font-style="italic">Each line that adds files = a layer</text>
  </g>

  <!-- Arrow from Dockerfile to Layers -->
  <line x1="445" y1="290" x2="540" y2="290" stroke="#1f2937" stroke-width="3" marker-end="url(#ar)"/>
  <text x="492" y="280" text-anchor="middle" font-size="11" fill="#0f172a" font-style="italic">docker build</text>

  <!-- Layer stack -->
  <text x="780" y="125" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Image (stack of layers)</text>

  <!-- Container scratch (RW, on top) -->
  <g filter="url(#sh)">
    <rect x="560" y="140" width="440" height="50" rx="6" fill="#dc2626" stroke="#7f1d1d" stroke-width="2"/>
    <text x="780" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="white">Container Layer (Read/Write)</text>
    <text x="780" y="178" text-anchor="middle" font-size="10" fill="#fee2e2" font-style="italic">created when container starts; deleted when container is removed</text>
  </g>

  <!-- Layers (top to bottom, latest at top) -->
  <g filter="url(#sh)">
    <rect x="560" y="195" width="440" height="40" rx="6" fill="#fde047" stroke="#854d0e" stroke-width="1.5"/>
    <text x="580" y="220" font-size="11" font-weight="700" fill="#713f12">L7 &#8226; CMD</text>
    <text x="780" y="220" text-anchor="middle" font-size="10" fill="#713f12" font-style="italic">metadata only, no files (zero size)</text>
  </g>
  <g filter="url(#sh)">
    <rect x="560" y="240" width="440" height="40" rx="6" fill="#fbbf24" stroke="#854d0e" stroke-width="1.5"/>
    <text x="580" y="265" font-size="11" font-weight="700" fill="#713f12">L6 &#8226; EXPOSE</text>
    <text x="780" y="265" text-anchor="middle" font-size="10" fill="#713f12" font-style="italic">metadata only</text>
  </g>
  <g filter="url(#sh)">
    <rect x="560" y="285" width="440" height="40" rx="6" fill="#f59e0b" stroke="#854d0e" stroke-width="1.5"/>
    <text x="580" y="310" font-size="11" font-weight="700" fill="white">L5 &#8226; COPY . .</text>
    <text x="780" y="310" text-anchor="middle" font-size="10" fill="#fff7ed" font-style="italic">app source code (~2MB)</text>
  </g>
  <g filter="url(#sh)">
    <rect x="560" y="330" width="440" height="40" rx="6" fill="#f97316" stroke="#7c2d12" stroke-width="1.5"/>
    <text x="580" y="355" font-size="11" font-weight="700" fill="white">L4 &#8226; npm install</text>
    <text x="780" y="355" text-anchor="middle" font-size="10" fill="#fff7ed" font-style="italic">node_modules (~80MB)</text>
  </g>
  <g filter="url(#sh)">
    <rect x="560" y="375" width="440" height="40" rx="6" fill="#ea580c" stroke="#7c2d12" stroke-width="1.5"/>
    <text x="580" y="400" font-size="11" font-weight="700" fill="white">L3 &#8226; COPY package.json</text>
    <text x="780" y="400" text-anchor="middle" font-size="10" fill="#fff7ed" font-style="italic">small file (~1KB)</text>
  </g>
  <g filter="url(#sh)">
    <rect x="560" y="420" width="440" height="40" rx="6" fill="#c2410c" stroke="#7c2d12" stroke-width="1.5"/>
    <text x="580" y="445" font-size="11" font-weight="700" fill="white">L2 &#8226; install nodejs</text>
    <text x="780" y="445" text-anchor="middle" font-size="10" fill="#fff7ed" font-style="italic">~50MB</text>
  </g>
  <g filter="url(#sh)">
    <rect x="560" y="465" width="440" height="50" rx="6" fill="#9a3412" stroke="#7c2d12" stroke-width="1.5"/>
    <text x="580" y="486" font-size="11" font-weight="700" fill="white">L1 &#8226; FROM ubuntu:22.04</text>
    <text x="780" y="486" text-anchor="middle" font-size="10" fill="#fff7ed" font-style="italic">base OS (~80MB), shared across many images</text>
    <text x="780" y="503" text-anchor="middle" font-size="9" fill="#fed7aa" font-style="italic">stored once, used by all containers using this base</text>
  </g>

  <!-- Notes -->
  <text x="60" y="525" font-size="13" font-weight="700" fill="#0f172a">Why layers matter:</text>
  <text x="60" y="548" font-size="11" fill="#0f172a">&#8226; <tspan font-weight="700">Cache:</tspan> if package.json hasn't changed, `npm install` layer is reused -&gt; faster builds.</text>
  <text x="60" y="568" font-size="11" fill="#0f172a">&#8226; <tspan font-weight="700">Storage:</tspan> if 100 containers use ubuntu:22.04, the base layer is on disk only once.</text>
  <text x="60" y="588" font-size="11" fill="#0f172a">&#8226; <tspan font-weight="700">Pull speed:</tspan> only missing layers are downloaded from the registry.</text>
  <text x="60" y="608" font-size="11" fill="#0f172a">&#8226; <tspan font-weight="700">Order matters:</tspan> put rarely-changing things FIRST in the Dockerfile to maximize cache hits.</text>
</svg>
