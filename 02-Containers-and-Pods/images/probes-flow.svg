<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
    <marker id="arRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Container Health Probes</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">Three probes, three different jobs &#8226; All run inside the container</text>

  <!-- Container start -->
  <g filter="url(#sh)">
    <rect x="60" y="100" width="160" height="70" rx="10" fill="#94a3b8" stroke="#475569" stroke-width="2"/>
    <text x="140" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="white">Container starts</text>
    <text x="140" y="148" text-anchor="middle" font-size="10" fill="#f1f5f9">PID 1 launched</text>
    <text x="140" y="162" text-anchor="middle" font-size="9" fill="#f1f5f9" font-style="italic">but app may need warm-up</text>
  </g>

  <!-- Startup probe -->
  <g filter="url(#sh)">
    <rect x="280" y="100" width="220" height="70" rx="10" fill="#fbbf24" stroke="#854d0e" stroke-width="2"/>
    <text x="390" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">Startup Probe</text>
    <text x="390" y="148" text-anchor="middle" font-size="10" fill="#713f12">"Has the app started up?"</text>
    <text x="390" y="162" text-anchor="middle" font-size="9" fill="#713f12" font-style="italic">runs FIRST &#8226; gates the others</text>
  </g>

  <!-- Liveness -->
  <g filter="url(#sh)">
    <rect x="560" y="60" width="220" height="70" rx="10" fill="#dc2626" stroke="#7f1d1d" stroke-width="2"/>
    <text x="670" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="white">Liveness Probe</text>
    <text x="670" y="108" text-anchor="middle" font-size="10" fill="#fee2e2">"Is the app still alive?"</text>
    <text x="670" y="122" text-anchor="middle" font-size="9" fill="#fee2e2" font-style="italic">fail -&gt; container restarted</text>
  </g>

  <!-- Readiness -->
  <g filter="url(#sh)">
    <rect x="560" y="140" width="220" height="70" rx="10" fill="#16a34a" stroke="#14532d" stroke-width="2"/>
    <text x="670" y="168" text-anchor="middle" font-size="14" font-weight="700" fill="white">Readiness Probe</text>
    <text x="670" y="188" text-anchor="middle" font-size="10" fill="#dcfce7">"Can it accept traffic?"</text>
    <text x="670" y="202" text-anchor="middle" font-size="9" fill="#dcfce7" font-style="italic">fail -&gt; removed from Service endpoints</text>
  </g>

  <!-- Pod ready / serving -->
  <g filter="url(#sh)">
    <rect x="850" y="100" width="200" height="70" rx="10" fill="#0891b2" stroke="#155e75" stroke-width="2"/>
    <text x="950" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="white">Pod is Ready</text>
    <text x="950" y="148" text-anchor="middle" font-size="10" fill="#cffafe">Service routes traffic here</text>
    <text x="950" y="162" text-anchor="middle" font-size="9" fill="#cffafe" font-style="italic">Endpoints updated</text>
  </g>

  <!-- Arrows -->
  <line x1="220" y1="135" x2="278" y2="135" stroke="#1f2937" stroke-width="2.5" marker-end="url(#ar)"/>
  <line x1="500" y1="120" x2="558" y2="95" stroke="#1f2937" stroke-width="2.5" marker-end="url(#ar)"/>
  <line x1="500" y1="150" x2="558" y2="170" stroke="#1f2937" stroke-width="2.5" marker-end="url(#ar)"/>
  <line x1="780" y1="135" x2="848" y2="135" stroke="#1f2937" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- Probe types -->
  <text x="600" y="265" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Each probe can use one of three check methods:</text>

  <g filter="url(#sh)">
    <rect x="80" y="290" width="320" height="180" rx="12" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
    <text x="240" y="320" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">httpGet</text>
    <text x="240" y="345" text-anchor="middle" font-size="11" fill="#0f172a">HTTP GET request to a path</text>
    <text x="240" y="365" text-anchor="middle" font-size="10" fill="#475569">Pass: 200-399 status code</text>
    <line x1="100" y1="380" x2="380" y2="380" stroke="#1e40af" stroke-width="0.8"/>
    <text x="100" y="400" font-size="10" font-family="Consolas, monospace" fill="#0f172a">livenessProbe:</text>
    <text x="115" y="416" font-size="10" font-family="Consolas, monospace" fill="#0f172a">httpGet:</text>
    <text x="130" y="432" font-size="10" font-family="Consolas, monospace" fill="#0f172a">path: /healthz</text>
    <text x="130" y="448" font-size="10" font-family="Consolas, monospace" fill="#0f172a">port: 8080</text>
    <text x="115" y="464" font-size="10" font-family="Consolas, monospace" fill="#0f172a">periodSeconds: 10</text>
  </g>

  <g filter="url(#sh)">
    <rect x="440" y="290" width="320" height="180" rx="12" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <text x="600" y="320" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">tcpSocket</text>
    <text x="600" y="345" text-anchor="middle" font-size="11" fill="#0f172a">Open a TCP connection to a port</text>
    <text x="600" y="365" text-anchor="middle" font-size="10" fill="#475569">Pass: connection succeeds</text>
    <line x1="460" y1="380" x2="740" y2="380" stroke="#15803d" stroke-width="0.8"/>
    <text x="460" y="400" font-size="10" font-family="Consolas, monospace" fill="#0f172a">readinessProbe:</text>
    <text x="475" y="416" font-size="10" font-family="Consolas, monospace" fill="#0f172a">tcpSocket:</text>
    <text x="490" y="432" font-size="10" font-family="Consolas, monospace" fill="#0f172a">port: 5432</text>
    <text x="475" y="448" font-size="10" font-family="Consolas, monospace" fill="#0f172a">initialDelaySeconds: 5</text>
    <text x="475" y="464" font-size="10" font-family="Consolas, monospace" fill="#0f172a">periodSeconds: 10</text>
  </g>

  <g filter="url(#sh)">
    <rect x="800" y="290" width="320" height="180" rx="12" fill="#fef3c7" stroke="#854d0e" stroke-width="2"/>
    <text x="960" y="320" text-anchor="middle" font-size="15" font-weight="700" fill="#713f12">exec</text>
    <text x="960" y="345" text-anchor="middle" font-size="11" fill="#0f172a">Run a shell command inside container</text>
    <text x="960" y="365" text-anchor="middle" font-size="10" fill="#475569">Pass: exit code 0</text>
    <line x1="820" y1="380" x2="1100" y2="380" stroke="#854d0e" stroke-width="0.8"/>
    <text x="820" y="400" font-size="10" font-family="Consolas, monospace" fill="#0f172a">startupProbe:</text>
    <text x="835" y="416" font-size="10" font-family="Consolas, monospace" fill="#0f172a">exec:</text>
    <text x="850" y="432" font-size="10" font-family="Consolas, monospace" fill="#0f172a">command:</text>
    <text x="850" y="448" font-size="10" font-family="Consolas, monospace" fill="#0f172a">- cat</text>
    <text x="850" y="464" font-size="10" font-family="Consolas, monospace" fill="#0f172a">- /tmp/ready</text>
  </g>

  <!-- Failure flows -->
  <text x="600" y="510" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">What happens when a probe FAILS:</text>

  <g>
    <rect x="80" y="530" width="320" height="140" rx="10" fill="#fef3c7" stroke="#854d0e"/>
    <text x="240" y="555" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">Startup fails</text>
    <text x="240" y="582" text-anchor="middle" font-size="11" fill="#0f172a">After failureThreshold attempts,</text>
    <text x="240" y="600" text-anchor="middle" font-size="11" fill="#0f172a">kubelet kills the container.</text>
    <text x="240" y="620" text-anchor="middle" font-size="11" fill="#0f172a">Restart policy decides next step.</text>
    <text x="240" y="650" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">Liveness/Readiness do not run yet.</text>
  </g>
  <g>
    <rect x="440" y="530" width="320" height="140" rx="10" fill="#fee2e2" stroke="#7f1d1d"/>
    <text x="600" y="555" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">Liveness fails</text>
    <text x="600" y="582" text-anchor="middle" font-size="11" fill="#0f172a">kubelet KILLS the container.</text>
    <text x="600" y="600" text-anchor="middle" font-size="11" fill="#0f172a">Restart policy applies.</text>
    <text x="600" y="620" text-anchor="middle" font-size="11" fill="#0f172a">Repeated failure -&gt; CrashLoopBackOff</text>
    <text x="600" y="650" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">Use to detect deadlocks.</text>
  </g>
  <g>
    <rect x="800" y="530" width="320" height="140" rx="10" fill="#dcfce7" stroke="#15803d"/>
    <text x="960" y="555" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Readiness fails</text>
    <text x="960" y="582" text-anchor="middle" font-size="11" fill="#0f172a">Pod stays running, NOT killed.</text>
    <text x="960" y="600" text-anchor="middle" font-size="11" fill="#0f172a">Removed from Service endpoints.</text>
    <text x="960" y="620" text-anchor="middle" font-size="11" fill="#0f172a">No traffic until it passes again.</text>
    <text x="960" y="650" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">Use during temporary overload.</text>
  </g>
</svg>
