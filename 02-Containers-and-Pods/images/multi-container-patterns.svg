<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="1200" height="600" fill="#f8fafc"/>
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Multi-Container Pod Patterns</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">Three common patterns for putting more than one container in a pod</text>

  <!-- Sidecar -->
  <text x="200" y="100" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">1. Sidecar</text>
  <text x="200" y="120" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">helper enhances main</text>

  <rect x="60" y="135" width="280" height="280" rx="14" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="200" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">Pod</text>

  <g filter="url(#sh)">
    <rect x="80" y="180" width="110" height="110" rx="10" fill="#16a34a" stroke="#14532d" stroke-width="2"/>
    <text x="135" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="white">Main App</text>
    <text x="135" y="230" text-anchor="middle" font-size="10" fill="#dcfce7">writes logs to</text>
    <text x="135" y="246" text-anchor="middle" font-size="10" fill="#dcfce7">/var/log/app</text>
    <text x="135" y="270" text-anchor="middle" font-size="9" fill="#dcfce7" font-style="italic">e.g., webserver</text>
  </g>

  <g filter="url(#sh)">
    <rect x="210" y="180" width="110" height="110" rx="10" fill="#0d9488" stroke="#115e59" stroke-width="2"/>
    <text x="265" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="white">Sidecar</text>
    <text x="265" y="230" text-anchor="middle" font-size="10" fill="#ccfbf1">tails /var/log/app</text>
    <text x="265" y="246" text-anchor="middle" font-size="10" fill="#ccfbf1">ships to ELK / Loki</text>
    <text x="265" y="270" text-anchor="middle" font-size="9" fill="#ccfbf1" font-style="italic">e.g., fluentbit</text>
  </g>

  <!-- Shared volume bar -->
  <rect x="80" y="305" width="240" height="35" rx="6" fill="#7c3aed" stroke="#4c1d95" stroke-width="1.5"/>
  <text x="200" y="328" text-anchor="middle" font-size="11" font-weight="700" fill="white">Shared volume: /var/log/app</text>

  <text x="200" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Examples</text>
  <text x="200" y="383" text-anchor="middle" font-size="10" fill="#0f172a">log shipper, metrics scraper,</text>
  <text x="200" y="397" text-anchor="middle" font-size="10" fill="#0f172a">file syncer, service mesh proxy</text>

  <!-- Ambassador -->
  <text x="600" y="100" text-anchor="middle" font-size="17" font-weight="700" fill="#7c2d12">2. Ambassador</text>
  <text x="600" y="120" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">helper proxies for main</text>

  <rect x="460" y="135" width="280" height="280" rx="14" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="600" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">Pod</text>

  <g filter="url(#sh)">
    <rect x="480" y="180" width="110" height="110" rx="10" fill="#16a34a" stroke="#14532d" stroke-width="2"/>
    <text x="535" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="white">Main App</text>
    <text x="535" y="230" text-anchor="middle" font-size="10" fill="#dcfce7">connects to</text>
    <text x="535" y="246" text-anchor="middle" font-size="10" fill="#dcfce7">localhost:6379</text>
    <text x="535" y="270" text-anchor="middle" font-size="9" fill="#dcfce7" font-style="italic">no auth needed</text>
  </g>

  <g filter="url(#sh)">
    <rect x="610" y="180" width="110" height="110" rx="10" fill="#dc2626" stroke="#7f1d1d" stroke-width="2"/>
    <text x="665" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="white">Ambassador</text>
    <text x="665" y="230" text-anchor="middle" font-size="10" fill="#fee2e2">listens :6379</text>
    <text x="665" y="246" text-anchor="middle" font-size="10" fill="#fee2e2">forwards to remote</text>
    <text x="665" y="270" text-anchor="middle" font-size="9" fill="#fee2e2" font-style="italic">handles TLS, auth</text>
  </g>

  <!-- localhost arrow -->
  <line x1="591" y1="235" x2="608" y2="235" stroke="#1f2937" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="600" y="222" text-anchor="middle" font-size="9" fill="#0f172a" font-style="italic">localhost</text>

  <!-- Outbound to remote -->
  <line x1="665" y1="290" x2="665" y2="335" stroke="#1f2937" stroke-width="2.5" marker-end="url(#ar)"/>
  <rect x="600" y="335" width="130" height="30" rx="5" fill="#475569"/>
  <text x="665" y="354" text-anchor="middle" font-size="10" font-weight="700" fill="white">Remote Redis</text>

  <text x="600" y="395" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Examples</text>
  <text x="600" y="408" text-anchor="middle" font-size="10" fill="#0f172a">DB proxy, mTLS terminator,</text>
  <text x="600" y="422" text-anchor="middle" font-size="10" fill="#0f172a">protocol translator (Envoy)</text>

  <!-- Adapter -->
  <text x="1000" y="100" text-anchor="middle" font-size="17" font-weight="700" fill="#0c4a6e">3. Adapter</text>
  <text x="1000" y="120" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">helper translates main's output</text>

  <rect x="860" y="135" width="280" height="280" rx="14" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="1000" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">Pod</text>

  <g filter="url(#sh)">
    <rect x="880" y="180" width="110" height="110" rx="10" fill="#16a34a" stroke="#14532d" stroke-width="2"/>
    <text x="935" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="white">Main App</text>
    <text x="935" y="230" text-anchor="middle" font-size="10" fill="#dcfce7">exposes legacy</text>
    <text x="935" y="246" text-anchor="middle" font-size="10" fill="#dcfce7">/stats (custom JSON)</text>
    <text x="935" y="270" text-anchor="middle" font-size="9" fill="#dcfce7" font-style="italic">cannot be modified</text>
  </g>

  <g filter="url(#sh)">
    <rect x="1010" y="180" width="110" height="110" rx="10" fill="#0891b2" stroke="#155e75" stroke-width="2"/>
    <text x="1065" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="white">Adapter</text>
    <text x="1065" y="230" text-anchor="middle" font-size="10" fill="#cffafe">scrapes /stats</text>
    <text x="1065" y="246" text-anchor="middle" font-size="10" fill="#cffafe">exposes /metrics</text>
    <text x="1065" y="270" text-anchor="middle" font-size="9" fill="#cffafe" font-style="italic">in Prometheus format</text>
  </g>

  <!-- Outbound -->
  <line x1="1065" y1="290" x2="1065" y2="335" stroke="#1f2937" stroke-width="2.5" marker-end="url(#ar)"/>
  <rect x="1000" y="335" width="130" height="30" rx="5" fill="#475569"/>
  <text x="1065" y="354" text-anchor="middle" font-size="10" font-weight="700" fill="white">Prometheus</text>

  <text x="1000" y="395" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Examples</text>
  <text x="1000" y="408" text-anchor="middle" font-size="10" fill="#0f172a">metrics format converter,</text>
  <text x="1000" y="422" text-anchor="middle" font-size="10" fill="#0f172a">log format normalizer</text>

  <!-- Init container note -->
  <rect x="60" y="450" width="1080" height="120" rx="14" fill="#e0e7ff" stroke="#3730a3" stroke-width="2"/>
  <text x="80" y="478" font-size="15" font-weight="700" fill="#1e1b4b">Bonus: Init Containers</text>
  <text x="80" y="500" font-size="11" fill="#0f172a">Init containers run BEFORE the main containers, in order, and must complete successfully. Common uses:</text>
  <text x="100" y="520" font-size="11" fill="#0f172a">&#8226; Wait for a database or service to be ready</text>
  <text x="100" y="538" font-size="11" fill="#0f172a">&#8226; Run database migrations or seed data</text>
  <text x="100" y="556" font-size="11" fill="#0f172a">&#8226; Download config / certificates from a remote source before app starts</text>
</svg>
