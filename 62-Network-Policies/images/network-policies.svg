<svg viewBox="0 0 820 420" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
<rect width="820" height="420" fill="#0d1117"/>
<text x="410" y="32" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="bold">Network Policy: Three-Tier Traffic Control</text>
<rect x="20" y="55" width="120" height="60" rx="8" fill="#2d1f5f" stroke="#d2a8ff" stroke-width="2"/>
<text x="80" y="82" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="bold">Internet</text>
<text x="80" y="100" text-anchor="middle" fill="#8b949e" font-size="10">all traffic</text>
<line x1="140" y1="85" x2="190" y2="85" stroke="#3fb950" stroke-width="2"/>
<rect x="190" y="55" width="130" height="60" rx="8" fill="#1a3a2a" stroke="#3fb950" stroke-width="2"/>
<text x="255" y="82" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Frontend</text>
<text x="255" y="100" text-anchor="middle" fill="#8b949e" font-size="10">tier=frontend</text>
<line x1="320" y1="85" x2="370" y2="85" stroke="#3fb950" stroke-width="2"/>
<text x="345" y="78" text-anchor="middle" fill="#3fb950" font-size="9">:80 only</text>
<rect x="370" y="55" width="130" height="60" rx="8" fill="#1a3a2a" stroke="#3fb950" stroke-width="2"/>
<text x="435" y="82" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Backend</text>
<text x="435" y="100" text-anchor="middle" fill="#8b949e" font-size="10">tier=backend</text>
<line x1="500" y1="85" x2="550" y2="85" stroke="#3fb950" stroke-width="2"/>
<text x="525" y="78" text-anchor="middle" fill="#3fb950" font-size="9">:5432 only</text>
<rect x="550" y="55" width="130" height="60" rx="8" fill="#1a3a2a" stroke="#3fb950" stroke-width="2"/>
<text x="615" y="82" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Database</text>
<text x="615" y="100" text-anchor="middle" fill="#8b949e" font-size="10">tier=database</text>
<rect x="700" y="55" width="100" height="60" rx="8" fill="#3a1a1a" stroke="#f85149" stroke-width="2"/>
<text x="750" y="82" text-anchor="middle" fill="#f85149" font-size="12" font-weight="bold">testpod</text>
<line x1="700" y1="85" x2="680" y2="85" stroke="#f85149" stroke-width="1" stroke-dasharray="5,3"/>
<text x="690" y="78" text-anchor="middle" fill="#f85149" font-size="9">blocked</text>
<rect x="20" y="155" width="780" height="240" rx="8" fill="#161b22" stroke="#30363d"/>
<text x="410" y="178" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">AND vs OR Logic in NetworkPolicy from Rules</text>
<rect x="40" y="192" width="350" height="185" rx="6" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1"/>
<text x="215" y="215" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">OR Logic (two list items)</text>
<text x="60" y="238" fill="#8b949e" font-size="10">ingress:</text>
<text x="60" y="255" fill="#8b949e" font-size="10">- from:</text>
<text x="60" y="272" fill="#3fb950" font-size="10">  - namespaceSelector:   # from ANY pod</text>
<text x="60" y="289" fill="#3fb950" font-size="10">      matchLabels: {env: prod} # in prod ns</text>
<text x="60" y="306" fill="#d2a8ff" font-size="10">  - podSelector:        # OR any admin pod</text>
<text x="60" y="323" fill="#d2a8ff" font-size="10">      matchLabels: {role: admin} # any ns</text>
<text x="215" y="355" text-anchor="middle" fill="#8b949e" font-size="10">Matches namespace OR pod — broader</text>
<rect x="430" y="192" width="350" height="185" rx="6" fill="#1a3a2a" stroke="#3fb950" stroke-width="1"/>
<text x="605" y="215" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">AND Logic (one list item)</text>
<text x="450" y="238" fill="#8b949e" font-size="10">ingress:</text>
<text x="450" y="255" fill="#8b949e" font-size="10">- from:</text>
<text x="450" y="272" fill="#3fb950" font-size="10">  - namespaceSelector:   # pod must be in</text>
<text x="450" y="289" fill="#3fb950" font-size="10">      matchLabels: {env: prod} # prod namespace</text>
<text x="450" y="306" fill="#3fb950" font-size="10">    podSelector:         # AND have admin label</text>
<text x="450" y="323" fill="#3fb950" font-size="10">      matchLabels: {role: admin}</text>
<text x="605" y="355" text-anchor="middle" fill="#8b949e" font-size="10">Matches BOTH conditions — stricter</text>
<text x="410" y="408" text-anchor="middle" fill="#f0883e" font-size="11">Always add UDP/TCP port 53 egress — DNS required for service name resolution</text>
</svg>