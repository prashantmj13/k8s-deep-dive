<svg viewBox="0 0 820 360" xmlns="http://www.w3.org/2000/svg" font-family="monospace"><rect width="820" height="360" fill="#0d1117"/><text x="410" y="32" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="bold">PVC Binding Flow</text><rect x="30" y="60" width="160" height="80" rx="8" fill="#2d1f5f" stroke="#d2a8ff" stroke-width="2"/><text x="110" y="90" text-anchor="middle" fill="#d2a8ff" font-size="13" font-weight="bold">Developer</text><text x="110" y="110" text-anchor="middle" fill="#8b949e" font-size="11">creates PVC</text><text x="110" y="128" text-anchor="middle" fill="#8b949e" font-size="10">500Mi RWO manual</text><line x1="190" y1="100" x2="240" y2="100" stroke="#d2a8ff" stroke-width="2"/><rect x="240" y="60" width="180" height="80" rx="8" fill="#1f3a5f" stroke="#58a6ff" stroke-width="2"/><text x="330" y="88" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">Kubernetes</text><text x="330" y="108" text-anchor="middle" fill="#8b949e" font-size="11">finds matching PV</text><text x="330" y="126" text-anchor="middle" fill="#8b949e" font-size="10">size, mode, class, labels</text><line x1="420" y1="100" x2="470" y2="100" stroke="#3fb950" stroke-width="2"/><rect x="470" y="60" width="160" height="80" rx="8" fill="#1a3a2a" stroke="#3fb950" stroke-width="2"/><text x="550" y="88" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="bold">PV</text><text x="550" y="108" text-anchor="middle" fill="#8b949e" font-size="11">2Gi RWO manual</text><text x="550" y="126" text-anchor="middle" fill="#3fb950" font-size="10">STATUS: Bound</text><rect x="650" y="60" width="140" height="80" rx="8" fill="#1a3a2a" stroke="#3fb950" stroke-width="2"/><text x="720" y="88" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="bold">Pod</text><text x="720" y="108" text-anchor="middle" fill="#8b949e" font-size="11">mounts PVC</text><text x="720" y="126" text-anchor="middle" fill="#8b949e" font-size="10">at /data</text><line x1="630" y1="100" x2="650" y2="100" stroke="#3fb950" stroke-width="2"/><rect x="30" y="185" width="760" height="155" rx="8" fill="#161b22" stroke="#30363d"/><text x="410" y="208" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">Binding Rules — PV must satisfy ALL of these</text><text x="80" y="235" fill="#3fb950" font-size="12">1.</text><text x="100" y="235" fill="#8b949e" font-size="11">accessModes — PV must support all requested modes</text><text x="80" y="255" fill="#3fb950" font-size="12">2.</text><text x="100" y="255" fill="#8b949e" font-size="11">storage — PV capacity must be &gt;= requested amount</text><text x="80" y="275" fill="#3fb950" font-size="12">3.</text><text x="100" y="275" fill="#8b949e" font-size="11">storageClassName — must match exactly</text><text x="80" y="295" fill="#3fb950" font-size="12">4.</text><text x="100" y="295" fill="#8b949e" font-size="11">volumeMode — Filesystem or Block must match</text><text x="80" y="315" fill="#3fb950" font-size="12">5.</text><text x="100" y="315" fill="#8b949e" font-size="11">selector — PV labels must match (if specified). Best fit wins.</text></svg>