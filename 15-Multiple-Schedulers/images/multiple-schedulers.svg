<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="1200" height="600" fill="#f8fafc"/>
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Multiple Schedulers in One Cluster</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">A pod's <tspan font-family="Consolas, monospace">spec.schedulerName</tspan> selects which scheduler binds it to a node</text>

  <!-- API server -->
  <g filter="url(#sh)"><rect x="500" y="100" width="200" height="80" rx="10" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/><text x="600" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="white">API Server</text><text x="600" y="155" text-anchor="middle" font-size="11" fill="#dbeafe">Pods queued unscheduled</text></g>

  <!-- Default scheduler -->
  <g filter="url(#sh)"><rect x="60" y="240" width="280" height="120" rx="14" fill="#0d9488" stroke="#115e59" stroke-width="2"/><text x="200" y="270" text-anchor="middle" font-size="15" font-weight="700" fill="white">default-scheduler</text><text x="200" y="295" text-anchor="middle" font-size="11" fill="#ccfbf1">handles pods with</text><text x="200" y="312" text-anchor="middle" font-size="11" font-family="Consolas, monospace" fill="#ccfbf1">schedulerName: ""</text><text x="200" y="328" text-anchor="middle" font-size="11" font-family="Consolas, monospace" fill="#ccfbf1">or "default-scheduler"</text><text x="200" y="350" text-anchor="middle" font-size="10" fill="#ccfbf1" font-style="italic">runs as static pod</text></g>

  <!-- Custom scheduler -->
  <g filter="url(#sh)"><rect x="430" y="240" width="280" height="120" rx="14" fill="#7c3aed" stroke="#3b0764" stroke-width="2"/><text x="570" y="270" text-anchor="middle" font-size="15" font-weight="700" fill="white">my-scheduler</text><text x="570" y="295" text-anchor="middle" font-size="11" fill="#ede9fe">handles pods with</text><text x="570" y="312" text-anchor="middle" font-size="11" font-family="Consolas, monospace" fill="#ede9fe">schedulerName: my-scheduler</text><text x="570" y="335" text-anchor="middle" font-size="10" fill="#ede9fe" font-style="italic">deploy as Deployment</text><text x="570" y="350" text-anchor="middle" font-size="10" fill="#ede9fe" font-style="italic">in kube-system</text></g>

  <!-- Third party (Volcano / Yunikorn) -->
  <g filter="url(#sh)"><rect x="800" y="240" width="340" height="120" rx="14" fill="#dc2626" stroke="#7f1d1d" stroke-width="2"/><text x="970" y="270" text-anchor="middle" font-size="15" font-weight="700" fill="white">volcano / yunikorn / etc.</text><text x="970" y="295" text-anchor="middle" font-size="11" fill="#fee2e2">Batch / ML workloads</text><text x="970" y="315" text-anchor="middle" font-size="11" font-family="Consolas, monospace" fill="#fee2e2">schedulerName: volcano</text><text x="970" y="345" text-anchor="middle" font-size="10" fill="#fee2e2" font-style="italic">gang scheduling, fairness</text></g>

  <line x1="500" y1="160" x2="280" y2="240" stroke="#1f2937" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="600" y1="180" x2="570" y2="240" stroke="#1f2937" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="700" y1="160" x2="900" y2="240" stroke="#1f2937" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Notes -->
  <rect x="60" y="400" width="1080" height="180" rx="14" fill="#fef3c7" stroke="#854d0e" stroke-width="2"/>
  <text x="80" y="428" font-size="14" font-weight="700" fill="#713f12">How this works</text>
  <text x="80" y="453" font-size="11" fill="#0f172a">&#8226; Each scheduler watches the API for pods whose <tspan font-family="Consolas, monospace">spec.schedulerName</tspan> matches its own.</text>
  <text x="80" y="471" font-size="11" fill="#0f172a">&#8226; Each is responsible only for its own pods. They do not coordinate.</text>
  <text x="80" y="489" font-size="11" fill="#0f172a">&#8226; If two schedulers both try to bind the same pod, only one PATCH wins (etcd resourceVersion); the other 409s.</text>
  <text x="80" y="507" font-size="11" fill="#0f172a">&#8226; A pod with no <tspan font-family="Consolas, monospace">schedulerName</tspan> defaults to <tspan font-family="Consolas, monospace">default-scheduler</tspan>.</text>
  <text x="80" y="525" font-size="11" fill="#0f172a">&#8226; A custom scheduler is just a process that talks to the API. Anyone can write one.</text>
  <text x="80" y="555" font-size="11" font-weight="700" fill="#713f12">Use cases:</text>
  <text x="80" y="572" font-size="11" fill="#0f172a">Specialized batch (Volcano), HPC, ML gang scheduling, custom placement policies for very specific workloads.</text>
</svg>
