<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1e40af"/>
    </marker>
    <linearGradient id="cpBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="wnBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="880" fill="#f8fafc"/>

  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Kubernetes Cluster Architecture</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">Control Plane manages state &#8226; Worker Nodes run the workloads</text>

  <!-- User -->
  <g filter="url(#shadow)">
    <rect x="60" y="100" width="180" height="70" rx="10" fill="#8b5cf6" stroke="#5b21b6" stroke-width="2"/>
    <text x="150" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="white">User / Admin</text>
    <text x="150" y="148" text-anchor="middle" font-size="11" fill="#ede9fe">kubectl &#8226; REST API &#8226; UI</text>
  </g>
  <line x1="240" y1="135" x2="362" y2="240" stroke="#1f2937" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="265" y="195" font-size="11" fill="#374151" font-style="italic">HTTPS :6443</text>

  <!-- CONTROL PLANE container -->
  <rect x="290" y="200" width="860" height="260" rx="14" fill="url(#cpBg)" stroke="#1e40af" stroke-width="2" stroke-dasharray="7,5"/>
  <text x="720" y="226" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">CONTROL PLANE  (Master Node)</text>

  <!-- API Server (center) -->
  <g filter="url(#shadow)">
    <rect x="330" y="245" width="180" height="90" rx="10" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
    <text x="420" y="275" text-anchor="middle" font-size="15" font-weight="700" fill="white">kube-apiserver</text>
    <text x="420" y="295" text-anchor="middle" font-size="11" fill="#dbeafe">Front door of cluster</text>
    <text x="420" y="313" text-anchor="middle" font-size="10" fill="#dbeafe" font-style="italic">Auth, validate, persist</text>
  </g>

  <!-- etcd -->
  <g filter="url(#shadow)">
    <rect x="560" y="245" width="170" height="90" rx="10" fill="#0891b2" stroke="#155e75" stroke-width="2"/>
    <text x="645" y="275" text-anchor="middle" font-size="15" font-weight="700" fill="white">etcd</text>
    <text x="645" y="295" text-anchor="middle" font-size="11" fill="#cffafe">Cluster database</text>
    <text x="645" y="313" text-anchor="middle" font-size="10" fill="#cffafe" font-style="italic">Key-value store (Raft)</text>
  </g>

  <!-- Scheduler -->
  <g filter="url(#shadow)">
    <rect x="330" y="350" width="180" height="90" rx="10" fill="#0d9488" stroke="#115e59" stroke-width="2"/>
    <text x="420" y="380" text-anchor="middle" font-size="15" font-weight="700" fill="white">kube-scheduler</text>
    <text x="420" y="400" text-anchor="middle" font-size="11" fill="#ccfbf1">Decides node for pods</text>
    <text x="420" y="418" text-anchor="middle" font-size="10" fill="#ccfbf1" font-style="italic">CPU, mem, taints, affinity</text>
  </g>

  <!-- Controller Manager -->
  <g filter="url(#shadow)">
    <rect x="560" y="350" width="170" height="90" rx="10" fill="#7c3aed" stroke="#4c1d95" stroke-width="2"/>
    <text x="645" y="375" text-anchor="middle" font-size="14" font-weight="700" fill="white">kube-controller-</text>
    <text x="645" y="392" text-anchor="middle" font-size="14" font-weight="700" fill="white">manager</text>
    <text x="645" y="412" text-anchor="middle" font-size="11" fill="#ede9fe">Reconciles desired state</text>
    <text x="645" y="428" text-anchor="middle" font-size="10" fill="#ede9fe" font-style="italic">Node, Replica, Endpoint...</text>
  </g>

  <!-- Cloud Controller Manager -->
  <g filter="url(#shadow)">
    <rect x="780" y="295" width="170" height="100" rx="10" fill="#94a3b8" stroke="#475569" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="865" y="325" text-anchor="middle" font-size="14" font-weight="700" fill="white">cloud-controller-</text>
    <text x="865" y="342" text-anchor="middle" font-size="14" font-weight="700" fill="white">manager</text>
    <text x="865" y="362" text-anchor="middle" font-size="11" fill="#f1f5f9">Optional</text>
    <text x="865" y="378" text-anchor="middle" font-size="10" fill="#f1f5f9" font-style="italic">AWS / GCP / Azure</text>
  </g>

  <!-- internal arrows API <-> etcd -->
  <line x1="510" y1="280" x2="558" y2="280" stroke="#1e40af" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="558" y1="300" x2="510" y2="300" stroke="#1e40af" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- API <-> Scheduler -->
  <line x1="420" y1="335" x2="420" y2="348" stroke="#1e40af" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="440" y1="348" x2="440" y2="335" stroke="#1e40af" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- API <-> Controller Manager -->
  <line x1="510" y1="320" x2="558" y2="370" stroke="#1e40af" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="558" y1="385" x2="510" y2="335" stroke="#1e40af" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- API <-> Cloud Controller -->
  <line x1="510" y1="295" x2="778" y2="320" stroke="#1e40af" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>

  <!-- Arrows from CP to Worker Nodes -->
  <line x1="430" y1="460" x2="270" y2="540" stroke="#1f2937" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="720" y1="460" x2="870" y2="540" stroke="#1f2937" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- WORKER NODE 1 -->
  <rect x="60" y="540" width="490" height="290" rx="14" fill="url(#wnBg)" stroke="#15803d" stroke-width="2"/>
  <text x="305" y="567" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">WORKER NODE 1</text>

  <g filter="url(#shadow)">
    <rect x="80" y="585" width="140" height="68" rx="8" fill="#16a34a" stroke="#14532d" stroke-width="2"/>
    <text x="150" y="610" text-anchor="middle" font-size="13" font-weight="700" fill="white">kubelet</text>
    <text x="150" y="630" text-anchor="middle" font-size="10" fill="#dcfce7">Node agent</text>
    <text x="150" y="645" text-anchor="middle" font-size="9" fill="#dcfce7" font-style="italic">runs pods</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="240" y="585" width="140" height="68" rx="8" fill="#65a30d" stroke="#365314" stroke-width="2"/>
    <text x="310" y="610" text-anchor="middle" font-size="13" font-weight="700" fill="white">kube-proxy</text>
    <text x="310" y="630" text-anchor="middle" font-size="10" fill="#ecfccb">Network rules</text>
    <text x="310" y="645" text-anchor="middle" font-size="9" fill="#ecfccb" font-style="italic">iptables / IPVS</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="400" y="585" width="135" height="68" rx="8" fill="#0891b2" stroke="#155e75" stroke-width="2"/>
    <text x="467" y="608" text-anchor="middle" font-size="12" font-weight="700" fill="white">Container</text>
    <text x="467" y="624" text-anchor="middle" font-size="12" font-weight="700" fill="white">Runtime</text>
    <text x="467" y="643" text-anchor="middle" font-size="9" fill="#cffafe" font-style="italic">containerd / CRI-O</text>
  </g>

  <!-- Pods Node 1 -->
  <rect x="80" y="675" width="455" height="140" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="307" y="695" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">Pods (managed by kubelet)</text>

  <g filter="url(#shadow)">
    <rect x="100" y="710" width="120" height="90" rx="8" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
    <text x="160" y="735" text-anchor="middle" font-size="12" font-weight="700" fill="white">Pod</text>
    <circle cx="135" cy="765" r="14" fill="#fff" stroke="#b45309" stroke-width="1.5"/>
    <text x="135" y="769" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">C</text>
    <circle cx="170" cy="765" r="14" fill="#fff" stroke="#b45309" stroke-width="1.5"/>
    <text x="170" y="769" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">C</text>
    <text x="160" y="793" text-anchor="middle" font-size="9" fill="#fff7ed">app + sidecar</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="240" y="710" width="120" height="90" rx="8" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
    <text x="300" y="735" text-anchor="middle" font-size="12" font-weight="700" fill="white">Pod</text>
    <circle cx="300" cy="765" r="14" fill="#fff" stroke="#b45309" stroke-width="1.5"/>
    <text x="300" y="769" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">C</text>
    <text x="300" y="793" text-anchor="middle" font-size="9" fill="#fff7ed">single container</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="380" y="710" width="135" height="90" rx="8" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
    <text x="447" y="735" text-anchor="middle" font-size="12" font-weight="700" fill="white">Pod</text>
    <circle cx="447" cy="765" r="14" fill="#fff" stroke="#b45309" stroke-width="1.5"/>
    <text x="447" y="769" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">C</text>
    <text x="447" y="793" text-anchor="middle" font-size="9" fill="#fff7ed">single container</text>
  </g>

  <!-- WORKER NODE 2 -->
  <rect x="660" y="540" width="490" height="290" rx="14" fill="url(#wnBg)" stroke="#15803d" stroke-width="2"/>
  <text x="905" y="567" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">WORKER NODE 2</text>

  <g filter="url(#shadow)">
    <rect x="680" y="585" width="140" height="68" rx="8" fill="#16a34a" stroke="#14532d" stroke-width="2"/>
    <text x="750" y="610" text-anchor="middle" font-size="13" font-weight="700" fill="white">kubelet</text>
    <text x="750" y="630" text-anchor="middle" font-size="10" fill="#dcfce7">Node agent</text>
    <text x="750" y="645" text-anchor="middle" font-size="9" fill="#dcfce7" font-style="italic">runs pods</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="840" y="585" width="140" height="68" rx="8" fill="#65a30d" stroke="#365314" stroke-width="2"/>
    <text x="910" y="610" text-anchor="middle" font-size="13" font-weight="700" fill="white">kube-proxy</text>
    <text x="910" y="630" text-anchor="middle" font-size="10" fill="#ecfccb">Network rules</text>
    <text x="910" y="645" text-anchor="middle" font-size="9" fill="#ecfccb" font-style="italic">iptables / IPVS</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1000" y="585" width="135" height="68" rx="8" fill="#0891b2" stroke="#155e75" stroke-width="2"/>
    <text x="1067" y="608" text-anchor="middle" font-size="12" font-weight="700" fill="white">Container</text>
    <text x="1067" y="624" text-anchor="middle" font-size="12" font-weight="700" fill="white">Runtime</text>
    <text x="1067" y="643" text-anchor="middle" font-size="9" fill="#cffafe" font-style="italic">containerd / CRI-O</text>
  </g>

  <!-- Pods Node 2 -->
  <rect x="680" y="675" width="455" height="140" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="907" y="695" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">Pods (managed by kubelet)</text>

  <g filter="url(#shadow)">
    <rect x="700" y="710" width="120" height="90" rx="8" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
    <text x="760" y="735" text-anchor="middle" font-size="12" font-weight="700" fill="white">Pod</text>
    <circle cx="760" cy="765" r="14" fill="#fff" stroke="#b45309" stroke-width="1.5"/>
    <text x="760" y="769" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">C</text>
    <text x="760" y="793" text-anchor="middle" font-size="9" fill="#fff7ed">single container</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="840" y="710" width="135" height="90" rx="8" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
    <text x="907" y="735" text-anchor="middle" font-size="12" font-weight="700" fill="white">Pod</text>
    <circle cx="890" cy="765" r="14" fill="#fff" stroke="#b45309" stroke-width="1.5"/>
    <text x="890" y="769" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">C</text>
    <circle cx="925" cy="765" r="14" fill="#fff" stroke="#b45309" stroke-width="1.5"/>
    <text x="925" y="769" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">C</text>
    <text x="907" y="793" text-anchor="middle" font-size="9" fill="#fff7ed">app + sidecar</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="995" y="710" width="135" height="90" rx="8" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
    <text x="1062" y="735" text-anchor="middle" font-size="12" font-weight="700" fill="white">Pod</text>
    <circle cx="1062" cy="765" r="14" fill="#fff" stroke="#b45309" stroke-width="1.5"/>
    <text x="1062" y="769" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">C</text>
    <text x="1062" y="793" text-anchor="middle" font-size="9" fill="#fff7ed">single container</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 838)">
    <rect x="0" y="0" width="14" height="14" fill="#2563eb"/>
    <text x="20" y="12" font-size="11" fill="#0f172a">Control plane component</text>
    <rect x="180" y="0" width="14" height="14" fill="#16a34a"/>
    <text x="200" y="12" font-size="11" fill="#0f172a">Worker node component</text>
    <rect x="360" y="0" width="14" height="14" fill="#f59e0b"/>
    <text x="380" y="12" font-size="11" fill="#0f172a">Pod (smallest unit)</text>
    <rect x="510" y="0" width="14" height="14" fill="#fff" stroke="#b45309"/>
    <text x="530" y="12" font-size="11" fill="#0f172a">C = Container inside pod</text>
    <line x1="710" y1="7" x2="740" y2="7" stroke="#1e40af" stroke-width="2"/>
    <text x="746" y="12" font-size="11" fill="#0f172a">Internal control flow</text>
    <line x1="900" y1="7" x2="930" y2="7" stroke="#1f2937" stroke-width="2.5"/>
    <text x="936" y="12" font-size="11" fill="#0f172a">External traffic</text>
  </g>
</svg>
