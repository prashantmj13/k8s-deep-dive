<svg viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
<rect width="820" height="380" fill="#0d1117"/>
<text x="410" y="30" text-anchor="middle" fill="#58a6ff" font-size="17" font-weight="bold">NetworkPolicy: Three-Tier Isolation</text>
<rect x="20" y="55" width="140" height="70" rx="8" fill="#2d1f5f" stroke="#d2a8ff" stroke-width="2"/>
<text x="90" y="83" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="bold">Internet</text>
<text x="90" y="103" text-anchor="middle" fill="#8b949e" font-size="10">Ingress Ctrl</text>
<line x1="160" y1="90" x2="200" y2="90" stroke="#3fb950" stroke-width="2"/>
<text x="180" y="83" text-anchor="middle" fill="#3fb950" font-size="9">allow</text>
<rect x="200" y="55" width="140" height="70" rx="8" fill="#1f3a5f" stroke="#58a6ff" stroke-width="2"/>
<text x="270" y="78" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">Frontend</text>
<text x="270" y="96" text-anchor="middle" fill="#8b949e" font-size="10">tier=frontend</text>
<text x="270" y="114" text-anchor="middle" fill="#3fb950" font-size="9">policy: allow ingress</text>
<line x1="340" y1="90" x2="390" y2="90" stroke="#3fb950" stroke-width="2"/>
<text x="365" y="83" text-anchor="middle" fill="#3fb950" font-size="9">allow</text>
<rect x="390" y="55" width="140" height="70" rx="8" fill="#1f3a5f" stroke="#58a6ff" stroke-width="2"/>
<text x="460" y="78" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">Backend</text>
<text x="460" y="96" text-anchor="middle" fill="#8b949e" font-size="10">tier=backend</text>
<text x="460" y="114" text-anchor="middle" fill="#3fb950" font-size="9">policy: from frontend only</text>
<line x1="530" y1="90" x2="580" y2="90" stroke="#3fb950" stroke-width="2"/>
<text x="555" y="83" text-anchor="middle" fill="#3fb950" font-size="9">allow</text>
<rect x="580" y="55" width="140" height="70" rx="8" fill="#1a3a2a" stroke="#3fb950" stroke-width="2"/>
<text x="650" y="78" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Database</text>
<text x="650" y="96" text-anchor="middle" fill="#8b949e" font-size="10">tier=database</text>
<text x="650" y="114" text-anchor="middle" fill="#3fb950" font-size="9">policy: from backend only</text>
<rect x="20" y="155" width="140" height="50" rx="8" fill="#3a1a1a" stroke="#f85149" stroke-width="1" stroke-dasharray="5,3"/>
<text x="90" y="178" text-anchor="middle" fill="#f85149" font-size="11">testpod</text>
<text x="90" y="196" text-anchor="middle" fill="#8b949e" font-size="9">no tier label</text>
<line x1="160" y1="180" x2="200" y2="140" stroke="#f85149" stroke-width="1" stroke-dasharray="4,3"/>
<text x="185" y="163" text-anchor="middle" fill="#f85149" font-size="9">blocked</text>
<line x1="160" y1="180" x2="390" y2="140" stroke="#f85149" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="160" y1="180" x2="580" y2="140" stroke="#f85149" stroke-width="1" stroke-dasharray="4,3"/>
<rect x="20" y="235" width="780" height="120" rx="8" fill="#161b22" stroke="#30363d"/>
<text x="410" y="258" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">AND vs OR Selector Logic</text>
<rect x="40" y="268" width="340" height="70" rx="6" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1"/>
<text x="210" y="288" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">OR: two list items</text>
<text x="210" y="308" text-anchor="middle" fill="#8b949e" font-size="10">- namespaceSelector: {ns: prod}</text>
<text x="210" y="326" text-anchor="middle" fill="#8b949e" font-size="10">- podSelector: {role: admin}   matches either</text>
<rect x="440" y="268" width="340" height="70" rx="6" fill="#1a3a2a" stroke="#3fb950" stroke-width="1"/>
<text x="610" y="288" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">AND: one list item with both</text>
<text x="610" y="308" text-anchor="middle" fill="#8b949e" font-size="10">- namespaceSelector: {ns: prod}</text>
<text x="610" y="326" text-anchor="middle" fill="#8b949e" font-size="10">  podSelector: {role: admin}   must match both</text>
</svg>