<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="750" fill="#f8fafc"/>
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">RollingUpdate Strategy &#8212; Step by Step</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">replicas=4 &#8226; maxSurge=1 &#8226; maxUnavailable=1 &#8226; v1 -&gt; v2</text>

  <!-- Headers -->
  <text x="160" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Step</text>
  <text x="500" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">Old RS (v1)</text>
  <text x="900" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">New RS (v2)</text>

  <!-- Step 1 -->
  <text x="160" y="135" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">0. start</text>
  <text x="160" y="153" text-anchor="middle" font-size="10" fill="#475569">old=4 new=0</text>
  <g transform="translate(330,118)">
    <rect width="50" height="35" rx="5" fill="#f59e0b"/><text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
    <rect x="60" width="50" height="35" rx="5" fill="#f59e0b"/><text x="85" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
    <rect x="120" width="50" height="35" rx="5" fill="#f59e0b"/><text x="145" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
    <rect x="180" width="50" height="35" rx="5" fill="#f59e0b"/><text x="205" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
  </g>

  <!-- Step 2: surge -->
  <text x="160" y="195" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">1. surge new</text>
  <text x="160" y="213" text-anchor="middle" font-size="10" fill="#475569">create 1 v2 (maxSurge)</text>
  <g transform="translate(330,178)">
    <rect width="50" height="35" rx="5" fill="#f59e0b"/><text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
    <rect x="60" width="50" height="35" rx="5" fill="#f59e0b"/><text x="85" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
    <rect x="120" width="50" height="35" rx="5" fill="#f59e0b"/><text x="145" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
    <rect x="180" width="50" height="35" rx="5" fill="#f59e0b"/><text x="205" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
  </g>
  <g transform="translate(820,178)">
    <rect width="50" height="35" rx="5" fill="#86efac" stroke="#14532d" stroke-width="1.5" stroke-dasharray="3,2"/><text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">v2</text>
  </g>
  <text x="1100" y="200" font-size="10" fill="#475569" font-style="italic">total=5 (4 ready)</text>

  <!-- Step 3: scale down old -->
  <text x="160" y="255" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">2. drain old</text>
  <text x="160" y="273" text-anchor="middle" font-size="10" fill="#475569">v2 ready -&gt; kill 1 v1</text>
  <g transform="translate(330,238)">
    <rect width="50" height="35" rx="5" fill="#f59e0b"/><text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
    <rect x="60" width="50" height="35" rx="5" fill="#f59e0b"/><text x="85" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
    <rect x="120" width="50" height="35" rx="5" fill="#f59e0b"/><text x="145" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
    <rect x="180" width="50" height="35" rx="5" fill="#f59e0b" opacity="0.35"/><text x="205" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
    <line x1="180" y1="0" x2="230" y2="35" stroke="#7f1d1d" stroke-width="2"/>
  </g>
  <g transform="translate(820,238)">
    <rect width="50" height="35" rx="5" fill="#16a34a"/><text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v2</text>
  </g>

  <!-- Step 4 -->
  <text x="160" y="315" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">3. surge new</text>
  <text x="160" y="333" text-anchor="middle" font-size="10" fill="#475569">create another v2</text>
  <g transform="translate(330,298)">
    <rect width="50" height="35" rx="5" fill="#f59e0b"/><text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
    <rect x="60" width="50" height="35" rx="5" fill="#f59e0b"/><text x="85" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
    <rect x="120" width="50" height="35" rx="5" fill="#f59e0b"/><text x="145" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
  </g>
  <g transform="translate(820,298)">
    <rect width="50" height="35" rx="5" fill="#16a34a"/><text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v2</text>
    <rect x="60" width="50" height="35" rx="5" fill="#86efac" stroke="#14532d" stroke-width="1.5" stroke-dasharray="3,2"/><text x="85" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">v2</text>
  </g>

  <!-- Step 5 -->
  <text x="160" y="375" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">4. drain old</text>
  <g transform="translate(330,358)">
    <rect width="50" height="35" rx="5" fill="#f59e0b"/><text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
    <rect x="60" width="50" height="35" rx="5" fill="#f59e0b"/><text x="85" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
    <rect x="120" width="50" height="35" rx="5" fill="#f59e0b" opacity="0.35"/><text x="145" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
    <line x1="120" y1="0" x2="170" y2="35" stroke="#7f1d1d" stroke-width="2"/>
  </g>
  <g transform="translate(820,358)">
    <rect width="50" height="35" rx="5" fill="#16a34a"/><text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v2</text>
    <rect x="60" width="50" height="35" rx="5" fill="#16a34a"/><text x="85" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v2</text>
  </g>

  <!-- Step 6 -->
  <text x="160" y="435" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">5. surge / drain</text>
  <g transform="translate(330,418)">
    <rect width="50" height="35" rx="5" fill="#f59e0b"/><text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
    <rect x="60" width="50" height="35" rx="5" fill="#f59e0b"/><text x="85" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
  </g>
  <g transform="translate(820,418)">
    <rect width="50" height="35" rx="5" fill="#16a34a"/><text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v2</text>
    <rect x="60" width="50" height="35" rx="5" fill="#16a34a"/><text x="85" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v2</text>
    <rect x="120" width="50" height="35" rx="5" fill="#86efac" stroke="#14532d" stroke-width="1.5" stroke-dasharray="3,2"/><text x="145" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">v2</text>
  </g>

  <!-- Step 7 -->
  <text x="160" y="495" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">6. continue...</text>
  <g transform="translate(330,478)">
    <rect width="50" height="35" rx="5" fill="#f59e0b"/><text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v1</text>
  </g>
  <g transform="translate(820,478)">
    <rect width="50" height="35" rx="5" fill="#16a34a"/><text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v2</text>
    <rect x="60" width="50" height="35" rx="5" fill="#16a34a"/><text x="85" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v2</text>
    <rect x="120" width="50" height="35" rx="5" fill="#16a34a"/><text x="145" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v2</text>
  </g>

  <!-- Step 8: final -->
  <text x="160" y="555" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">7. done</text>
  <text x="160" y="573" text-anchor="middle" font-size="10" fill="#475569">old=0 new=4</text>
  <g transform="translate(820,538)">
    <rect width="50" height="35" rx="5" fill="#16a34a"/><text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v2</text>
    <rect x="60" width="50" height="35" rx="5" fill="#16a34a"/><text x="85" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v2</text>
    <rect x="120" width="50" height="35" rx="5" fill="#16a34a"/><text x="145" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v2</text>
    <rect x="180" width="50" height="35" rx="5" fill="#16a34a"/><text x="205" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">v2</text>
  </g>

  <!-- Notes -->
  <rect x="60" y="610" width="1080" height="120" rx="14" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
  <text x="80" y="635" font-size="14" font-weight="700" fill="#1e3a8a">Two knobs you control</text>
  <text x="80" y="658" font-size="11" fill="#0f172a"><tspan font-weight="700">maxSurge</tspan> &#8212; how many EXTRA pods may exist above replicas during rollout (e.g., 1 or 25%). Higher = faster rollout.</text>
  <text x="80" y="678" font-size="11" fill="#0f172a"><tspan font-weight="700">maxUnavailable</tspan> &#8212; how many pods may be MISSING during rollout. Higher = faster rollout, but lower capacity floor.</text>
  <text x="80" y="703" font-size="11" fill="#0f172a">Set <tspan font-family="Consolas, monospace">maxSurge: 0, maxUnavailable: 1</tspan> for "no extra pods" rollouts (resource-constrained clusters).</text>
  <text x="80" y="720" font-size="11" fill="#0f172a">Set <tspan font-family="Consolas, monospace">maxSurge: 100%, maxUnavailable: 0</tspan> for blue-green-ish rollouts (double capacity briefly, never below baseline).</text>
</svg>
