<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="600" fill="#f8fafc"/>
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Two Built-In Rollout Strategies</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">Plus the canary &amp; blue-green patterns you build with two Deployments</text>

  <!-- RollingUpdate -->
  <g filter="url(#sh)">
    <rect x="60" y="100" width="540" height="220" rx="14" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  </g>
  <text x="330" y="130" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">RollingUpdate (default)</text>
  <text x="80" y="160" font-size="11" fill="#0f172a">&#8226; Old &amp; new versions run side-by-side during rollout</text>
  <text x="80" y="180" font-size="11" fill="#0f172a">&#8226; Capacity stays at or near baseline throughout</text>
  <text x="80" y="200" font-size="11" fill="#0f172a">&#8226; Zero downtime IF readiness probes are correct</text>
  <text x="80" y="220" font-size="11" fill="#0f172a">&#8226; Two knobs: <tspan font-family="Consolas, monospace">maxSurge</tspan> &amp; <tspan font-family="Consolas, monospace">maxUnavailable</tspan></text>
  <text x="80" y="245" font-size="11" font-weight="700" fill="#14532d">Best for: stateless web apps, APIs</text>

  <text x="80" y="275" font-size="10" font-family="Consolas, monospace" fill="#0f172a">strategy:</text>
  <text x="95" y="290" font-size="10" font-family="Consolas, monospace" fill="#0f172a">type: RollingUpdate</text>
  <text x="95" y="305" font-size="10" font-family="Consolas, monospace" fill="#0f172a">rollingUpdate:</text>
  <text x="110" y="320" font-size="10" font-family="Consolas, monospace" fill="#0f172a">maxSurge: 25%, maxUnavailable: 25%</text>

  <!-- Recreate -->
  <g filter="url(#sh)">
    <rect x="620" y="100" width="540" height="220" rx="14" fill="#fee2e2" stroke="#7f1d1d" stroke-width="2"/>
  </g>
  <text x="890" y="130" text-anchor="middle" font-size="17" font-weight="700" fill="#7f1d1d">Recreate</text>
  <text x="640" y="160" font-size="11" fill="#0f172a">&#8226; Kill ALL old pods first, then start new ones</text>
  <text x="640" y="180" font-size="11" fill="#0f172a">&#8226; DOWNTIME during the gap (capacity drops to 0)</text>
  <text x="640" y="200" font-size="11" fill="#0f172a">&#8226; No version mixing &#8212; only one version exists at a time</text>
  <text x="640" y="220" font-size="11" fill="#0f172a">&#8226; Required when versions are not backwards compatible</text>
  <text x="640" y="245" font-size="11" font-weight="700" fill="#7f1d1d">Best for: DB migrations, breaking schema changes</text>

  <text x="640" y="275" font-size="10" font-family="Consolas, monospace" fill="#0f172a">strategy:</text>
  <text x="655" y="290" font-size="10" font-family="Consolas, monospace" fill="#0f172a">type: Recreate</text>
  <text x="640" y="315" font-size="10" fill="#475569" font-style="italic">no rollingUpdate fields allowed</text>

  <!-- Canary -->
  <g filter="url(#sh)">
    <rect x="60" y="350" width="540" height="220" rx="14" fill="#fef3c7" stroke="#854d0e" stroke-width="2"/>
  </g>
  <text x="330" y="380" text-anchor="middle" font-size="17" font-weight="700" fill="#713f12">Canary (pattern, not built-in)</text>
  <text x="80" y="410" font-size="11" fill="#0f172a">&#8226; TWO Deployments: stable (large) + canary (small)</text>
  <text x="80" y="430" font-size="11" fill="#0f172a">&#8226; Same Service selector hits both -&gt; ratio is replica ratio</text>
  <text x="80" y="450" font-size="11" fill="#0f172a">&#8226; e.g., 9 stable + 1 canary = 10% canary traffic</text>
  <text x="80" y="470" font-size="11" fill="#0f172a">&#8226; Watch metrics; if good, scale up canary, scale down stable</text>
  <text x="80" y="495" font-size="11" font-weight="700" fill="#713f12">Best for: risky changes, A/B tests</text>

  <text x="80" y="525" font-size="10" font-family="Consolas, monospace" fill="#0f172a">Deployment "web-stable"  replicas: 9, image: v1</text>
  <text x="80" y="540" font-size="10" font-family="Consolas, monospace" fill="#0f172a">Deployment "web-canary"  replicas: 1, image: v2</text>
  <text x="80" y="555" font-size="10" font-family="Consolas, monospace" fill="#0f172a">Service selects app=web (matches both)</text>

  <!-- Blue-Green -->
  <g filter="url(#sh)">
    <rect x="620" y="350" width="540" height="220" rx="14" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
  </g>
  <text x="890" y="380" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">Blue-Green (pattern, not built-in)</text>
  <text x="640" y="410" font-size="11" fill="#0f172a">&#8226; TWO Deployments: blue (live) &amp; green (idle)</text>
  <text x="640" y="430" font-size="11" fill="#0f172a">&#8226; Service selector points at ONE of them via a label</text>
  <text x="640" y="450" font-size="11" fill="#0f172a">&#8226; Switch by patching the Service's selector</text>
  <text x="640" y="470" font-size="11" fill="#0f172a">&#8226; Instant cutover; instant rollback</text>
  <text x="640" y="495" font-size="11" font-weight="700" fill="#1e3a8a">Best for: heavy app reloads, full validation pre-cutover</text>

  <text x="640" y="525" font-size="10" font-family="Consolas, monospace" fill="#0f172a">Deployment "web-blue"   labels: { color: blue }</text>
  <text x="640" y="540" font-size="10" font-family="Consolas, monospace" fill="#0f172a">Deployment "web-green"  labels: { color: green }</text>
  <text x="640" y="555" font-size="10" font-family="Consolas, monospace" fill="#0f172a">Service selector: { app: web, color: blue } -&gt; flip</text>
</svg>
