<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Admission Controllers &#8212; The Pipeline</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">Every API request that creates/updates an object passes through this pipeline before being persisted</text>

  <!-- Pipeline -->
  <g filter="url(#sh)"><rect x="60" y="120" width="140" height="80" rx="10" fill="#8b5cf6"/><text x="130" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="white">Client</text><text x="130" y="170" text-anchor="middle" font-size="10" fill="#ede9fe">kubectl, controller</text><text x="130" y="186" text-anchor="middle" font-size="10" fill="#ede9fe">CI, etc.</text></g>
  <line x1="200" y1="160" x2="240" y2="160" stroke="#1f2937" stroke-width="2.5" marker-end="url(#ar)"/>

  <g filter="url(#sh)"><rect x="240" y="120" width="120" height="80" rx="10" fill="#2563eb"/><text x="300" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="white">Authn</text><text x="300" y="170" text-anchor="middle" font-size="10" fill="#dbeafe">who are you?</text></g>
  <line x1="360" y1="160" x2="400" y2="160" stroke="#1f2937" stroke-width="2.5" marker-end="url(#ar)"/>

  <g filter="url(#sh)"><rect x="400" y="120" width="120" height="80" rx="10" fill="#2563eb"/><text x="460" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="white">Authz</text><text x="460" y="170" text-anchor="middle" font-size="10" fill="#dbeafe">may you?</text><text x="460" y="186" text-anchor="middle" font-size="10" fill="#dbeafe" font-style="italic">RBAC</text></g>
  <line x1="520" y1="160" x2="560" y2="160" stroke="#1f2937" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- Mutating -->
  <g filter="url(#sh)"><rect x="560" y="100" width="180" height="120" rx="10" fill="#0d9488"/><text x="650" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="white">MUTATING</text><text x="650" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="white">admission</text><text x="650" y="170" text-anchor="middle" font-size="10" fill="#ccfbf1">may CHANGE the object</text><text x="650" y="186" text-anchor="middle" font-size="10" fill="#ccfbf1">e.g., add sidecar, set</text><text x="650" y="200" text-anchor="middle" font-size="10" fill="#ccfbf1">defaults, inject labels</text></g>
  <line x1="740" y1="160" x2="780" y2="160" stroke="#1f2937" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- Validation -->
  <g filter="url(#sh)"><rect x="780" y="100" width="180" height="120" rx="10" fill="#dc2626"/><text x="870" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="white">VALIDATING</text><text x="870" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="white">admission</text><text x="870" y="170" text-anchor="middle" font-size="10" fill="#fee2e2">may ACCEPT or REJECT</text><text x="870" y="186" text-anchor="middle" font-size="10" fill="#fee2e2">CANNOT change object</text><text x="870" y="200" text-anchor="middle" font-size="10" fill="#fee2e2">e.g., enforce policies</text></g>
  <line x1="960" y1="160" x2="1000" y2="160" stroke="#1f2937" stroke-width="2.5" marker-end="url(#ar)"/>

  <g filter="url(#sh)"><rect x="1000" y="120" width="140" height="80" rx="10" fill="#0891b2"/><text x="1070" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="white">etcd</text><text x="1070" y="170" text-anchor="middle" font-size="10" fill="#cffafe">persisted</text></g>

  <!-- Order matters -->
  <text x="600" y="280" text-anchor="middle" font-size="14" fill="#0f172a">Order matters: <tspan font-weight="700">Mutating ALWAYS runs before Validating.</tspan></text>
  <text x="600" y="300" text-anchor="middle" font-size="12" fill="#475569" font-style="italic">A mutating webhook can&apos;t bypass validation &#8212; the validators see the final object.</text>

  <!-- Examples -->
  <text x="600" y="340" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Built-in admission controllers (compiled into kube-apiserver)</text>

  <rect x="60" y="360" width="540" height="40" fill="#1e293b"/>
  <text x="80" y="385" font-size="12" font-weight="700" fill="white">Mutating examples</text>
  <rect x="620" y="360" width="520" height="40" fill="#1e293b"/>
  <text x="640" y="385" font-size="12" font-weight="700" fill="white">Validating examples</text>

  <g font-size="11" fill="#0f172a">
    <rect x="60" y="400" width="540" height="32" fill="#f1f5f9"/>
    <text x="80" y="420" font-family="Consolas, monospace" font-weight="700">DefaultStorageClass</text>
    <text x="320" y="420">adds default SC to PVCs without one</text>

    <rect x="60" y="432" width="540" height="32" fill="#ffffff"/>
    <text x="80" y="452" font-family="Consolas, monospace" font-weight="700">LimitRanger</text>
    <text x="320" y="452">injects default requests/limits</text>

    <rect x="60" y="464" width="540" height="32" fill="#f1f5f9"/>
    <text x="80" y="484" font-family="Consolas, monospace" font-weight="700">DefaultIngressClass</text>
    <text x="320" y="484">adds default ingressClass</text>

    <rect x="60" y="496" width="540" height="32" fill="#ffffff"/>
    <text x="80" y="516" font-family="Consolas, monospace" font-weight="700">ServiceAccount</text>
    <text x="320" y="516">injects default SA into pods</text>

    <rect x="620" y="400" width="520" height="32" fill="#f1f5f9"/>
    <text x="640" y="420" font-family="Consolas, monospace" font-weight="700">NamespaceLifecycle</text>
    <text x="850" y="420">block ops on Terminating ns</text>

    <rect x="620" y="432" width="520" height="32" fill="#ffffff"/>
    <text x="640" y="452" font-family="Consolas, monospace" font-weight="700">ResourceQuota</text>
    <text x="850" y="452">enforce namespace caps</text>

    <rect x="620" y="464" width="520" height="32" fill="#f1f5f9"/>
    <text x="640" y="484" font-family="Consolas, monospace" font-weight="700">PodSecurity</text>
    <text x="850" y="484">enforce pod security standards</text>

    <rect x="620" y="496" width="520" height="32" fill="#ffffff"/>
    <text x="640" y="516" font-family="Consolas, monospace" font-weight="700">NodeRestriction</text>
    <text x="850" y="516">limit what kubelet can write</text>
  </g>

  <text x="600" y="565" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">External via webhooks (HTTPS callouts to your service)</text>
  <rect x="60" y="580" width="1080" height="100" rx="10" fill="#fef3c7" stroke="#854d0e"/>
  <text x="80" y="605" font-size="11" fill="#0f172a">&#8226; <tspan font-weight="700">MutatingAdmissionWebhook</tspan> &#8212; runs your admission server, may modify the object (e.g., Istio injects sidecars).</text>
  <text x="80" y="623" font-size="11" fill="#0f172a">&#8226; <tspan font-weight="700">ValidatingAdmissionWebhook</tspan> &#8212; runs your policy server, accepts or rejects (e.g., OPA, Kyverno).</text>
  <text x="80" y="645" font-size="11" fill="#0f172a">&#8226; Both are controlled by <tspan font-family="Consolas, monospace">MutatingWebhookConfiguration</tspan> / <tspan font-family="Consolas, monospace">ValidatingWebhookConfiguration</tspan> objects.</text>
  <text x="80" y="665" font-size="11" fill="#0f172a">&#8226; Webhook can return a 30-second timeout; misconfiguration can break cluster operations.</text>
</svg>
