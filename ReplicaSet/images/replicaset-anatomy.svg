<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Anatomy of a ReplicaSet</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">Three fields define a ReplicaSet: replicas, selector, template</text>

  <!-- ReplicaSet object -->
  <g filter="url(#sh)">
    <rect x="60" y="100" width="430" height="540" rx="14" fill="#dbeafe" stroke="#1e40af" stroke-width="2.5"/>
  </g>
  <text x="80" y="130" font-size="16" font-weight="700" fill="#1e3a8a">ReplicaSet "web"</text>
  <text x="80" y="148" font-size="11" fill="#475569">apiVersion: apps/v1</text>

  <!-- Field 1: replicas -->
  <g filter="url(#sh)">
    <rect x="80" y="170" width="390" height="100" rx="10" fill="#3b82f6" stroke="#1e3a8a" stroke-width="2"/>
    <text x="100" y="195" font-size="14" font-weight="700" fill="white">spec.replicas</text>
    <text x="100" y="218" font-size="20" font-weight="700" fill="white" font-family="Consolas, monospace">3</text>
    <text x="160" y="218" font-size="11" fill="#dbeafe" font-style="italic">desired count</text>
    <line x1="100" y1="232" x2="450" y2="232" stroke="#dbeafe" stroke-width="0.8"/>
    <text x="100" y="250" font-size="11" fill="#dbeafe">"How many pods do I want?"</text>
    <text x="100" y="265" font-size="10" fill="#dbeafe" font-style="italic">controller continually drives reality to this number</text>
  </g>

  <!-- Field 2: selector -->
  <g filter="url(#sh)">
    <rect x="80" y="285" width="390" height="120" rx="10" fill="#7c3aed" stroke="#4c1d95" stroke-width="2"/>
    <text x="100" y="310" font-size="14" font-weight="700" fill="white">spec.selector</text>
    <text x="100" y="335" font-size="12" fill="#ede9fe" font-family="Consolas, monospace">matchLabels:</text>
    <text x="115" y="353" font-size="12" fill="#ede9fe" font-family="Consolas, monospace">app: web</text>
    <text x="115" y="370" font-size="12" fill="#ede9fe" font-family="Consolas, monospace">tier: frontend</text>
    <line x1="100" y1="378" x2="450" y2="378" stroke="#ede9fe" stroke-width="0.8"/>
    <text x="100" y="395" font-size="11" fill="#ede9fe">"Which pods belong to me?"</text>
  </g>

  <!-- Field 3: template -->
  <g filter="url(#sh)">
    <rect x="80" y="420" width="390" height="200" rx="10" fill="#16a34a" stroke="#14532d" stroke-width="2"/>
    <text x="100" y="445" font-size="14" font-weight="700" fill="white">spec.template</text>
    <text x="100" y="466" font-size="11" fill="#dcfce7" font-family="Consolas, monospace">metadata:</text>
    <text x="115" y="481" font-size="11" fill="#dcfce7" font-family="Consolas, monospace">labels:</text>
    <text x="130" y="496" font-size="11" fill="#dcfce7" font-family="Consolas, monospace">app: web</text>
    <text x="130" y="511" font-size="11" fill="#dcfce7" font-family="Consolas, monospace">tier: frontend</text>
    <text x="100" y="528" font-size="11" fill="#dcfce7" font-family="Consolas, monospace">spec:</text>
    <text x="115" y="543" font-size="11" fill="#dcfce7" font-family="Consolas, monospace">containers:</text>
    <text x="130" y="558" font-size="11" fill="#dcfce7" font-family="Consolas, monospace">- name: web</text>
    <text x="130" y="573" font-size="11" fill="#dcfce7" font-family="Consolas, monospace">  image: nginx</text>
    <line x1="100" y1="585" x2="450" y2="585" stroke="#dcfce7" stroke-width="0.8"/>
    <text x="100" y="602" font-size="11" fill="#dcfce7">"What does each pod look like?"</text>
    <text x="100" y="615" font-size="10" fill="#dcfce7" font-style="italic">used as blueprint when creating new pods</text>
  </g>

  <!-- Arrow from RS to Pods -->
  <line x1="500" y1="370" x2="600" y2="370" stroke="#1f2937" stroke-width="3" marker-end="url(#ar)"/>
  <text x="550" y="358" text-anchor="middle" font-size="11" fill="#0f172a" font-style="italic">manages</text>
  <text x="550" y="385" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">via labels</text>

  <!-- Pods being managed -->
  <text x="900" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#78350f">3 Pods (created from template)</text>

  <g filter="url(#sh)">
    <rect x="640" y="160" width="240" height="140" rx="10" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
    <text x="760" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="white">Pod  web-abc12</text>
    <text x="660" y="208" font-size="10" fill="#fff7ed" font-family="Consolas, monospace">labels:</text>
    <text x="675" y="222" font-size="10" fill="#fff7ed" font-family="Consolas, monospace">app: web</text>
    <text x="675" y="236" font-size="10" fill="#fff7ed" font-family="Consolas, monospace">tier: frontend</text>
    <text x="660" y="255" font-size="10" fill="#fff7ed" font-family="Consolas, monospace">ownerReferences:</text>
    <text x="675" y="269" font-size="10" fill="#fff7ed" font-family="Consolas, monospace">- kind: ReplicaSet</text>
    <text x="675" y="283" font-size="10" fill="#fff7ed" font-family="Consolas, monospace">  name: web</text>
  </g>

  <g filter="url(#sh)">
    <rect x="900" y="160" width="240" height="140" rx="10" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
    <text x="1020" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="white">Pod  web-def34</text>
    <text x="920" y="208" font-size="10" fill="#fff7ed" font-family="Consolas, monospace">labels:</text>
    <text x="935" y="222" font-size="10" fill="#fff7ed" font-family="Consolas, monospace">app: web</text>
    <text x="935" y="236" font-size="10" fill="#fff7ed" font-family="Consolas, monospace">tier: frontend</text>
    <text x="920" y="255" font-size="10" fill="#fff7ed" font-family="Consolas, monospace">ownerReferences:</text>
    <text x="935" y="269" font-size="10" fill="#fff7ed" font-family="Consolas, monospace">- kind: ReplicaSet</text>
    <text x="935" y="283" font-size="10" fill="#fff7ed" font-family="Consolas, monospace">  name: web</text>
  </g>

  <g filter="url(#sh)">
    <rect x="770" y="320" width="240" height="140" rx="10" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
    <text x="890" y="345" text-anchor="middle" font-size="13" font-weight="700" fill="white">Pod  web-ghi56</text>
    <text x="790" y="368" font-size="10" fill="#fff7ed" font-family="Consolas, monospace">labels:</text>
    <text x="805" y="382" font-size="10" fill="#fff7ed" font-family="Consolas, monospace">app: web</text>
    <text x="805" y="396" font-size="10" fill="#fff7ed" font-family="Consolas, monospace">tier: frontend</text>
    <text x="790" y="415" font-size="10" fill="#fff7ed" font-family="Consolas, monospace">ownerReferences:</text>
    <text x="805" y="429" font-size="10" fill="#fff7ed" font-family="Consolas, monospace">- kind: ReplicaSet</text>
    <text x="805" y="443" font-size="10" fill="#fff7ed" font-family="Consolas, monospace">  name: web</text>
  </g>

  <!-- Important notes -->
  <rect x="600" y="490" width="540" height="150" rx="14" fill="#fef3c7" stroke="#854d0e" stroke-width="2"/>
  <text x="620" y="515" font-size="14" font-weight="700" fill="#713f12">Two critical rules</text>
  <text x="620" y="540" font-size="11" fill="#0f172a">1. <tspan font-weight="700">Selector must match template labels.</tspan> If they disagree, the API rejects the RS.</text>
  <text x="620" y="560" font-size="11" fill="#0f172a">2. <tspan font-weight="700">Selector is immutable.</tspan> Once set, you cannot change it. (Replicas and template are mutable.)</text>
  <text x="620" y="588" font-size="11" fill="#0f172a"><tspan font-weight="700">Ownership</tspan> is recorded in each pod's <tspan font-family="Consolas, monospace">metadata.ownerReferences</tspan>.</text>
  <text x="620" y="608" font-size="11" fill="#0f172a">When the RS is deleted, the API server cascades the deletion to its pods (by default).</text>
  <text x="620" y="628" font-size="11" fill="#0f172a">When a pod loses the matching labels, the RS sees one missing and creates a new one.</text>
</svg>
