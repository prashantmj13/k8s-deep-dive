<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">The Reconciliation Loop</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">How the ReplicaSet controller drives reality toward the desired state</text>

  <!-- Center: ReplicaSet Controller -->
  <g filter="url(#sh)">
    <circle cx="600" cy="370" r="120" fill="#7c3aed" stroke="#3b0764" stroke-width="3"/>
    <text x="600" y="355" text-anchor="middle" font-size="16" font-weight="700" fill="white">ReplicaSet</text>
    <text x="600" y="377" text-anchor="middle" font-size="16" font-weight="700" fill="white">Controller</text>
    <text x="600" y="403" text-anchor="middle" font-size="11" fill="#ede9fe" font-style="italic">inside controller-manager</text>
  </g>

  <!-- Step 1: WATCH (top left) -->
  <g filter="url(#sh)">
    <rect x="100" y="120" width="280" height="120" rx="14" fill="#3b82f6" stroke="#1e3a8a" stroke-width="2"/>
    <text x="240" y="148" text-anchor="middle" font-size="16" font-weight="700" fill="white">1. WATCH</text>
    <text x="240" y="172" text-anchor="middle" font-size="12" fill="#dbeafe">Subscribe to API Server</text>
    <text x="240" y="190" text-anchor="middle" font-size="11" fill="#dbeafe">events for ReplicaSet &amp; Pod</text>
    <text x="240" y="208" text-anchor="middle" font-size="11" fill="#dbeafe">objects matching the selector</text>
    <text x="240" y="228" text-anchor="middle" font-size="10" fill="#dbeafe" font-style="italic">long-poll over HTTP</text>
  </g>

  <!-- Step 2: COMPARE (top right) -->
  <g filter="url(#sh)">
    <rect x="820" y="120" width="280" height="120" rx="14" fill="#0d9488" stroke="#115e59" stroke-width="2"/>
    <text x="960" y="148" text-anchor="middle" font-size="16" font-weight="700" fill="white">2. COMPARE</text>
    <text x="960" y="172" text-anchor="middle" font-size="12" fill="#ccfbf1">Count pods that match selector</text>
    <text x="960" y="192" text-anchor="middle" font-size="11" fill="#ccfbf1">desired = spec.replicas</text>
    <text x="960" y="208" text-anchor="middle" font-size="11" fill="#ccfbf1">actual  = matching pods</text>
    <text x="960" y="228" text-anchor="middle" font-size="11" fill="#ccfbf1">delta   = desired - actual</text>
  </g>

  <!-- Step 3: ACT - Create (bottom left) -->
  <g filter="url(#sh)">
    <rect x="100" y="510" width="280" height="120" rx="14" fill="#16a34a" stroke="#14532d" stroke-width="2"/>
    <text x="240" y="538" text-anchor="middle" font-size="16" font-weight="700" fill="white">3a. ACT (delta &gt; 0)</text>
    <text x="240" y="562" text-anchor="middle" font-size="12" fill="#dcfce7">CREATE new pods</text>
    <text x="240" y="582" text-anchor="middle" font-size="11" fill="#dcfce7">from spec.template</text>
    <text x="240" y="602" text-anchor="middle" font-size="11" fill="#dcfce7">with ownerReferences</text>
    <text x="240" y="620" text-anchor="middle" font-size="10" fill="#dcfce7" font-style="italic">parallel, in batches of 500</text>
  </g>

  <!-- Step 3b: ACT - Delete (bottom right) -->
  <g filter="url(#sh)">
    <rect x="820" y="510" width="280" height="120" rx="14" fill="#dc2626" stroke="#7f1d1d" stroke-width="2"/>
    <text x="960" y="538" text-anchor="middle" font-size="16" font-weight="700" fill="white">3b. ACT (delta &lt; 0)</text>
    <text x="960" y="562" text-anchor="middle" font-size="12" fill="#fee2e2">DELETE excess pods</text>
    <text x="960" y="582" text-anchor="middle" font-size="11" fill="#fee2e2">prefers Pending &gt; younger &gt;</text>
    <text x="960" y="602" text-anchor="middle" font-size="11" fill="#fee2e2">unhealthy &gt; on busy nodes</text>
    <text x="960" y="620" text-anchor="middle" font-size="10" fill="#fee2e2" font-style="italic">graceful termination applies</text>
  </g>

  <!-- Step 0: Equilibrium -->
  <g filter="url(#sh)">
    <rect x="500" y="600" width="200" height="60" rx="10" fill="#94a3b8" stroke="#475569" stroke-width="2"/>
    <text x="600" y="625" text-anchor="middle" font-size="13" font-weight="700" fill="white">delta = 0</text>
    <text x="600" y="645" text-anchor="middle" font-size="11" fill="#f1f5f9">do nothing, wait for next event</text>
  </g>

  <!-- Arrows: WATCH -> Controller -->
  <line x1="370" y1="220" x2="500" y2="320" stroke="#1f2937" stroke-width="3" marker-end="url(#ar)"/>
  <text x="395" y="280" font-size="11" fill="#0f172a" font-style="italic">events</text>

  <!-- Controller -> COMPARE -->
  <line x1="700" y1="320" x2="830" y2="220" stroke="#1f2937" stroke-width="3" marker-end="url(#ar)"/>
  <text x="780" y="280" font-size="11" fill="#0f172a" font-style="italic">read counts</text>

  <!-- COMPARE -> ACT (split) -->
  <line x1="900" y1="245" x2="650" y2="500" stroke="#dc2626" stroke-width="3" stroke-dasharray="4,3" marker-end="url(#ar)"/>
  <text x="800" y="395" font-size="11" fill="#7f1d1d" font-style="italic">too many</text>

  <line x1="900" y1="245" x2="380" y2="510" stroke="#16a34a" stroke-width="3" stroke-dasharray="4,3" marker-end="url(#ar)"/>
  <text x="630" y="430" font-size="11" fill="#14532d" font-style="italic">too few</text>

  <line x1="900" y1="240" x2="700" y2="600" stroke="#475569" stroke-width="2" stroke-dasharray="2,3" marker-end="url(#ar)"/>
  <text x="850" y="430" font-size="11" fill="#334155" font-style="italic">just right</text>

  <!-- ACT -> back to WATCH (loop) -->
  <line x1="240" y1="510" x2="240" y2="245" stroke="#1f2937" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#ar)"/>
  <text x="160" y="380" font-size="11" fill="#0f172a" font-style="italic">trigger new events,</text>
  <text x="160" y="395" font-size="11" fill="#0f172a" font-style="italic">loop continues</text>

  <line x1="960" y1="510" x2="960" y2="245" stroke="#1f2937" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#ar)"/>
  <text x="1010" y="380" font-size="11" fill="#0f172a" font-style="italic">delete events</text>
  <text x="1010" y="395" font-size="11" fill="#0f172a" font-style="italic">propagate</text>

  <!-- Footer -->
  <text x="600" y="680" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Key insight: this is a level-triggered loop. The controller reacts to the CURRENT state, not to events.</text>
</svg>
