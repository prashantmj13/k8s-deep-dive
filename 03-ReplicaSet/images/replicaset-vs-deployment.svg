<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Deployment, ReplicaSet, Pod — The Hierarchy</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">A Deployment manages ReplicaSets. A ReplicaSet manages Pods. Each level adds capability.</text>

  <!-- Hierarchy boxes (top section) -->
  <g filter="url(#sh)">
    <rect x="60" y="100" width="320" height="100" rx="12" fill="#dc2626" stroke="#7f1d1d" stroke-width="2"/>
    <text x="220" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="white">Deployment</text>
    <text x="220" y="155" text-anchor="middle" font-size="11" fill="#fee2e2">manages versioned rollouts</text>
    <text x="220" y="175" text-anchor="middle" font-size="11" fill="#fee2e2">history, rollback, strategies</text>
  </g>

  <line x1="220" y1="200" x2="220" y2="240" stroke="#1f2937" stroke-width="3" marker-end="url(#ar)"/>
  <text x="240" y="225" font-size="11" fill="#0f172a" font-style="italic">owns (1 active + N old)</text>

  <g filter="url(#sh)">
    <rect x="60" y="245" width="320" height="100" rx="12" fill="#7c3aed" stroke="#4c1d95" stroke-width="2"/>
    <text x="220" y="275" text-anchor="middle" font-size="16" font-weight="700" fill="white">ReplicaSet</text>
    <text x="220" y="300" text-anchor="middle" font-size="11" fill="#ede9fe">maintains N identical pods</text>
    <text x="220" y="320" text-anchor="middle" font-size="11" fill="#ede9fe">scaling + self-healing</text>
  </g>

  <line x1="220" y1="345" x2="220" y2="385" stroke="#1f2937" stroke-width="3" marker-end="url(#ar)"/>
  <text x="240" y="370" font-size="11" fill="#0f172a" font-style="italic">owns (N pods)</text>

  <g filter="url(#sh)">
    <rect x="60" y="390" width="320" height="100" rx="12" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
    <text x="220" y="420" text-anchor="middle" font-size="16" font-weight="700" fill="white">Pod</text>
    <text x="220" y="445" text-anchor="middle" font-size="11" fill="#fff7ed">runs the actual containers</text>
    <text x="220" y="465" text-anchor="middle" font-size="11" fill="#fff7ed">smallest deployable unit</text>
  </g>

  <!-- Capability table -->
  <text x="780" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">What each level adds</text>

  <rect x="450" y="135" width="700" height="40" fill="#1e293b"/>
  <text x="470" y="160" font-size="12" font-weight="700" fill="white">Capability</text>
  <text x="700" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="white">Pod</text>
  <text x="850" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="white">ReplicaSet</text>
  <text x="1050" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="white">Deployment</text>

  <g font-size="11" fill="#0f172a">
    <rect x="450" y="175" width="700" height="32" fill="#f1f5f9"/>
    <text x="470" y="195">Run a container</text>
    <text x="700" y="195" text-anchor="middle" font-weight="700" fill="#15803d">Yes</text>
    <text x="850" y="195" text-anchor="middle" font-weight="700" fill="#15803d">Yes</text>
    <text x="1050" y="195" text-anchor="middle" font-weight="700" fill="#15803d">Yes</text>

    <rect x="450" y="207" width="700" height="32" fill="#ffffff"/>
    <text x="470" y="227">Multiple identical replicas</text>
    <text x="700" y="227" text-anchor="middle" font-weight="700" fill="#dc2626">No</text>
    <text x="850" y="227" text-anchor="middle" font-weight="700" fill="#15803d">Yes</text>
    <text x="1050" y="227" text-anchor="middle" font-weight="700" fill="#15803d">Yes</text>

    <rect x="450" y="239" width="700" height="32" fill="#f1f5f9"/>
    <text x="470" y="259">Self-healing on pod death</text>
    <text x="700" y="259" text-anchor="middle" font-weight="700" fill="#dc2626">No</text>
    <text x="850" y="259" text-anchor="middle" font-weight="700" fill="#15803d">Yes</text>
    <text x="1050" y="259" text-anchor="middle" font-weight="700" fill="#15803d">Yes</text>

    <rect x="450" y="271" width="700" height="32" fill="#ffffff"/>
    <text x="470" y="291">Manual scaling</text>
    <text x="700" y="291" text-anchor="middle" font-weight="700" fill="#dc2626">No</text>
    <text x="850" y="291" text-anchor="middle" font-weight="700" fill="#15803d">Yes</text>
    <text x="1050" y="291" text-anchor="middle" font-weight="700" fill="#15803d">Yes</text>

    <rect x="450" y="303" width="700" height="32" fill="#f1f5f9"/>
    <text x="470" y="323">Rolling updates / rollback</text>
    <text x="700" y="323" text-anchor="middle" font-weight="700" fill="#dc2626">No</text>
    <text x="850" y="323" text-anchor="middle" font-weight="700" fill="#dc2626">No</text>
    <text x="1050" y="323" text-anchor="middle" font-weight="700" fill="#15803d">Yes</text>

    <rect x="450" y="335" width="700" height="32" fill="#ffffff"/>
    <text x="470" y="355">Revision history</text>
    <text x="700" y="355" text-anchor="middle" font-weight="700" fill="#dc2626">No</text>
    <text x="850" y="355" text-anchor="middle" font-weight="700" fill="#dc2626">No</text>
    <text x="1050" y="355" text-anchor="middle" font-weight="700" fill="#15803d">Yes</text>

    <rect x="450" y="367" width="700" height="32" fill="#f1f5f9"/>
    <text x="470" y="387">Pause/resume rollout</text>
    <text x="700" y="387" text-anchor="middle" font-weight="700" fill="#dc2626">No</text>
    <text x="850" y="387" text-anchor="middle" font-weight="700" fill="#dc2626">No</text>
    <text x="1050" y="387" text-anchor="middle" font-weight="700" fill="#15803d">Yes</text>
  </g>

  <!-- Bottom section: rolling update visualization -->
  <text x="600" y="440" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">During a rolling update, the Deployment juggles two ReplicaSets</text>

  <!-- Old ReplicaSet -->
  <g filter="url(#sh)">
    <rect x="80" y="470" width="500" height="180" rx="12" fill="#fee2e2" stroke="#7f1d1d" stroke-width="2"/>
    <text x="100" y="495" font-size="13" font-weight="700" fill="#7f1d1d">Old ReplicaSet  (image: app:v1)</text>
    <text x="100" y="513" font-size="11" fill="#0f172a">replicas: 3 -&gt; 2 -&gt; 1 -&gt; 0   (scaling DOWN)</text>

    <g><rect x="120" y="535" width="50" height="50" rx="6" fill="#f59e0b"/><text x="145" y="565" text-anchor="middle" font-size="11" font-weight="700" fill="white">P1</text></g>
    <g><rect x="190" y="535" width="50" height="50" rx="6" fill="#f59e0b" opacity="0.4"/><text x="215" y="565" text-anchor="middle" font-size="11" font-weight="700" fill="white">P2</text><line x1="190" y1="535" x2="240" y2="585" stroke="#7f1d1d" stroke-width="2"/></g>
    <g><rect x="260" y="535" width="50" height="50" rx="6" fill="#f59e0b" opacity="0.2"/><text x="285" y="565" text-anchor="middle" font-size="11" font-weight="700" fill="white">P3</text><line x1="260" y1="535" x2="310" y2="585" stroke="#7f1d1d" stroke-width="2"/></g>

    <text x="330" y="615" font-size="10" fill="#7f1d1d" font-style="italic">old pods drain &amp; terminate</text>
    <text x="330" y="630" font-size="10" fill="#7f1d1d" font-style="italic">graceful SIGTERM applies</text>
  </g>

  <!-- New ReplicaSet -->
  <g filter="url(#sh)">
    <rect x="620" y="470" width="500" height="180" rx="12" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <text x="640" y="495" font-size="13" font-weight="700" fill="#14532d">New ReplicaSet  (image: app:v2)</text>
    <text x="640" y="513" font-size="11" fill="#0f172a">replicas: 0 -&gt; 1 -&gt; 2 -&gt; 3   (scaling UP)</text>

    <g><rect x="660" y="535" width="50" height="50" rx="6" fill="#16a34a"/><text x="685" y="565" text-anchor="middle" font-size="11" font-weight="700" fill="white">P4</text></g>
    <g><rect x="730" y="535" width="50" height="50" rx="6" fill="#16a34a"/><text x="755" y="565" text-anchor="middle" font-size="11" font-weight="700" fill="white">P5</text></g>
    <g><rect x="800" y="535" width="50" height="50" rx="6" fill="#86efac" stroke="#14532d" stroke-width="1.5" stroke-dasharray="3,2"/><text x="825" y="565" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">P6</text></g>

    <text x="870" y="615" font-size="10" fill="#14532d" font-style="italic">new pods come up,</text>
    <text x="870" y="630" font-size="10" fill="#14532d" font-style="italic">guarded by readiness</text>
  </g>

  <text x="600" y="685" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">The Deployment controller scales the OLD RS down and the NEW RS up — that is what a "rolling update" actually is.</text>
</svg>
