<svg viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" font-family="monospace"><rect width="820" height="380" fill="#0d1117"/><text x="410" y="32" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="bold">StorageClass: Dynamic Provisioning</text><rect x="30" y="60" width="150" height="70" rx="8" fill="#2d1f5f" stroke="#d2a8ff" stroke-width="2"/><text x="105" y="88" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="bold">Developer</text><text x="105" y="108" text-anchor="middle" fill="#8b949e" font-size="10">kubectl apply pvc</text><line x1="180" y1="95" x2="230" y2="95" stroke="#d2a8ff" stroke-width="2"/><rect x="230" y="60" width="150" height="70" rx="8" fill="#1f3a5f" stroke="#58a6ff" stroke-width="2"/><text x="305" y="88" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">API Server</text><text x="305" y="108" text-anchor="middle" fill="#8b949e" font-size="10">stores PVC in etcd</text><line x1="380" y1="95" x2="430" y2="95" stroke="#58a6ff" stroke-width="2"/><rect x="430" y="60" width="150" height="70" rx="8" fill="#1f3a5f" stroke="#58a6ff" stroke-width="2"/><text x="505" y="83" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">StorageClass</text><text x="505" y="101" text-anchor="middle" fill="#8b949e" font-size="10">provisioner watches</text><text x="505" y="118" text-anchor="middle" fill="#8b949e" font-size="10">for new PVCs</text><line x1="580" y1="95" x2="630" y2="95" stroke="#3fb950" stroke-width="2"/><rect x="630" y="60" width="160" height="70" rx="8" fill="#1a3a2a" stroke="#3fb950" stroke-width="2"/><text x="710" y="88" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">PV auto-created</text><text x="710" y="108" text-anchor="middle" fill="#8b949e" font-size="10">bound to PVC</text><rect x="30" y="175" width="760" height="180" rx="8" fill="#161b22" stroke="#30363d"/><text x="410" y="198" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">Binding Modes</text><rect x="50" y="212" width="330" height="125" rx="6" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1"/><text x="215" y="235" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">Immediate</text><text x="215" y="255" text-anchor="middle" fill="#8b949e" font-size="11">PV provisioned on PVC creation</text><text x="215" y="275" text-anchor="middle" fill="#8b949e" font-size="11">Risk: AZ mismatch on multi-zone</text><text x="215" y="295" text-anchor="middle" fill="#8b949e" font-size="11">cluster (pod in zone-a,</text><text x="215" y="315" text-anchor="middle" fill="#8b949e" font-size="11">PV created in zone-b)</text><rect x="440" y="212" width="330" height="125" rx="6" fill="#1a3a2a" stroke="#3fb950" stroke-width="1"/><text x="605" y="235" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">WaitForFirstConsumer</text><text x="605" y="255" text-anchor="middle" fill="#8b949e" font-size="11">PV provisioned when pod scheduled</text><text x="605" y="275" text-anchor="middle" fill="#3fb950" font-size="11">Recommended for cloud</text><text x="605" y="295" text-anchor="middle" fill="#8b949e" font-size="11">PV created in same AZ as pod</text><text x="605" y="315" text-anchor="middle" fill="#8b949e" font-size="11">No topology mismatch</text></svg>