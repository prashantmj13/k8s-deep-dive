<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="1200" height="600" fill="#f8fafc"/>
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Validating Admission Webhook &#8212; Flow</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">API Server calls your webhook; you respond with allowed: true or false &#8226; You CANNOT modify the object</text>

  <!-- Client -->
  <g filter="url(#sh)"><rect x="60" y="120" width="120" height="60" rx="8" fill="#8b5cf6"/><text x="120" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="white">Client</text><text x="120" y="165" text-anchor="middle" font-size="10" fill="#ede9fe">kubectl apply</text></g>
  <line x1="180" y1="150" x2="220" y2="150" stroke="#1f2937" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- API Server -->
  <g filter="url(#sh)"><rect x="220" y="100" width="180" height="100" rx="10" fill="#2563eb"/><text x="310" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="white">API Server</text><text x="310" y="155" text-anchor="middle" font-size="10" fill="#dbeafe">authn -&gt; authz -&gt;</text><text x="310" y="170" text-anchor="middle" font-size="10" fill="#dbeafe">mutating -&gt; <tspan font-weight="700">validating</tspan></text><text x="310" y="185" text-anchor="middle" font-size="10" fill="#dbeafe" font-style="italic">finds matching webhook</text></g>

  <!-- Outgoing arrow with AdmissionReview -->
  <line x1="400" y1="135" x2="540" y2="135" stroke="#dc2626" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="470" y="125" text-anchor="middle" font-size="10" fill="#7f1d1d" font-weight="700">AdmissionReview (request)</text>
  <text x="470" y="155" text-anchor="middle" font-size="9" fill="#7f1d1d" font-style="italic">HTTPS POST</text>

  <!-- Webhook server -->
  <g filter="url(#sh)"><rect x="540" y="100" width="220" height="100" rx="10" fill="#dc2626"/><text x="650" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="white">Validating Webhook</text><text x="650" y="148" text-anchor="middle" font-size="11" fill="#fee2e2">your service</text><text x="650" y="168" text-anchor="middle" font-size="10" fill="#fee2e2" font-style="italic">reads object, runs policy</text><text x="650" y="184" text-anchor="middle" font-size="10" fill="#fee2e2" font-style="italic">returns yes/no + reason</text></g>

  <!-- Return arrow -->
  <line x1="540" y1="170" x2="400" y2="170" stroke="#dc2626" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="470" y="190" text-anchor="middle" font-size="10" fill="#7f1d1d" font-weight="700">AdmissionReview (response)</text>
  <text x="470" y="206" text-anchor="middle" font-size="9" fill="#7f1d1d" font-style="italic">{ allowed: bool, status: { message } }</text>

  <!-- Branch -->
  <line x1="310" y1="200" x2="180" y2="280" stroke="#16a34a" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="220" y="245" font-size="11" fill="#14532d" font-weight="700">allowed: true -&gt; persist</text>

  <line x1="310" y1="200" x2="450" y2="280" stroke="#7f1d1d" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="400" y="245" font-size="11" fill="#7f1d1d" font-weight="700">allowed: false -&gt; reject</text>

  <g filter="url(#sh)"><rect x="100" y="290" width="160" height="60" rx="8" fill="#16a34a"/><text x="180" y="315" text-anchor="middle" font-size="12" font-weight="700" fill="white">etcd persist</text><text x="180" y="335" text-anchor="middle" font-size="10" fill="#dcfce7">200 OK to client</text></g>

  <g filter="url(#sh)"><rect x="380" y="290" width="160" height="60" rx="8" fill="#7f1d1d"/><text x="460" y="315" text-anchor="middle" font-size="12" font-weight="700" fill="white">Return error</text><text x="460" y="335" text-anchor="middle" font-size="10" fill="#fee2e2">403 to client + message</text></g>

  <!-- Webhook config -->
  <text x="950" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">ValidatingWebhookConfiguration</text>
  <rect x="800" y="115" width="320" height="240" rx="10" fill="#f1f5f9" stroke="#475569"/>
  <text x="820" y="140" font-size="11" font-family="Consolas, monospace" fill="#0f172a">name: my-policy.example.com</text>
  <text x="820" y="156" font-size="11" font-family="Consolas, monospace" fill="#0f172a">rules:</text>
  <text x="835" y="172" font-size="11" font-family="Consolas, monospace" fill="#0f172a">- apiGroups: [""]</text>
  <text x="835" y="188" font-size="11" font-family="Consolas, monospace" fill="#0f172a">  apiVersions: ["v1"]</text>
  <text x="835" y="204" font-size="11" font-family="Consolas, monospace" fill="#0f172a">  resources: ["pods"]</text>
  <text x="835" y="220" font-size="11" font-family="Consolas, monospace" fill="#0f172a">  operations: ["CREATE","UPDATE"]</text>
  <text x="820" y="240" font-size="11" font-family="Consolas, monospace" fill="#0f172a">clientConfig:</text>
  <text x="835" y="256" font-size="11" font-family="Consolas, monospace" fill="#0f172a">service:</text>
  <text x="850" y="272" font-size="11" font-family="Consolas, monospace" fill="#0f172a">name: webhook</text>
  <text x="850" y="288" font-size="11" font-family="Consolas, monospace" fill="#0f172a">namespace: policies</text>
  <text x="820" y="308" font-size="11" font-family="Consolas, monospace" fill="#0f172a">failurePolicy: Fail</text>
  <text x="820" y="324" font-size="11" font-family="Consolas, monospace" fill="#0f172a">timeoutSeconds: 5</text>
  <text x="820" y="340" font-size="11" font-family="Consolas, monospace" fill="#0f172a">sideEffects: None</text>
  <text x="820" y="354" font-size="9" fill="#475569" font-style="italic">caBundle: ... (TLS cert)</text>

  <!-- Tools -->
  <rect x="60" y="400" width="1080" height="170" rx="14" fill="#fef3c7" stroke="#854d0e" stroke-width="2"/>
  <text x="80" y="428" font-size="14" font-weight="700" fill="#713f12">Real-world validating webhooks</text>
  <text x="80" y="453" font-size="11" fill="#0f172a">&#8226; <tspan font-weight="700">OPA Gatekeeper</tspan> &#8212; policies in Rego language; constraint templates + constraints</text>
  <text x="80" y="471" font-size="11" fill="#0f172a">&#8226; <tspan font-weight="700">Kyverno</tspan> &#8212; policies in YAML/CEL; popular for Kubernetes-native syntax</text>
  <text x="80" y="489" font-size="11" fill="#0f172a">&#8226; <tspan font-weight="700">cert-manager</tspan> &#8212; validates Certificate / Issuer resources</text>
  <text x="80" y="507" font-size="11" fill="#0f172a">&#8226; <tspan font-weight="700">aws-load-balancer-controller</tspan> &#8212; validates Ingress fields</text>
  <text x="80" y="525" font-size="11" fill="#0f172a">&#8226; Custom webhooks &#8212; written in Go (or any language) using `AdmissionReview` API</text>
  <text x="80" y="552" font-size="11" font-weight="700" fill="#713f12">Modern alternative for built-in checks: ValidatingAdmissionPolicy (CEL, no server needed).</text>
</svg>
