<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <rect width="800" height="420" fill="#0d1117"/>
  <text x="400" y="35" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="bold">Horizontal Pod Autoscaler (HPA)</text>

  <!-- Metrics Server -->
  <rect x="30" y="70" width="160" height="70" rx="8" fill="#1f3a5f" stroke="#58a6ff" stroke-width="2"/>
  <text x="110" y="100" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">Metrics Server</text>
  <text x="110" y="120" text-anchor="middle" fill="#8b949e" font-size="11">collects CPU/Mem</text>
  <text x="110" y="135" text-anchor="middle" fill="#8b949e" font-size="11">from kubelet</text>

  <!-- HPA Controller -->
  <rect x="310" y="70" width="180" height="70" rx="8" fill="#2d1f5f" stroke="#d2a8ff" stroke-width="2"/>
  <text x="400" y="100" text-anchor="middle" fill="#d2a8ff" font-size="13" font-weight="bold">HPA Controller</text>
  <text x="400" y="118" text-anchor="middle" fill="#8b949e" font-size="11">polls every 15s</text>
  <text x="400" y="133" text-anchor="middle" fill="#8b949e" font-size="11">computes desired replicas</text>

  <!-- Arrow: Metrics → HPA -->
  <line x1="190" y1="105" x2="310" y2="105" stroke="#58a6ff" stroke-width="2" marker-end="url(#a1)"/>
  <text x="250" y="97" text-anchor="middle" fill="#8b949e" font-size="10">metrics API</text>

  <!-- Deployment -->
  <rect x="600" y="70" width="160" height="70" rx="8" fill="#1a3a2a" stroke="#3fb950" stroke-width="2"/>
  <text x="680" y="100" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="bold">Deployment</text>
  <text x="680" y="118" text-anchor="middle" fill="#8b949e" font-size="11">php-apache</text>
  <text x="680" y="133" text-anchor="middle" fill="#3fb950" font-size="11">replicas: 1→4</text>

  <!-- Arrow: HPA → Deployment -->
  <line x1="490" y1="105" x2="600" y2="105" stroke="#3fb950" stroke-width="2" marker-end="url(#a2)"/>
  <text x="545" y="97" text-anchor="middle" fill="#8b949e" font-size="10">scale replicas</text>

  <!-- Pods row -->
  <text x="400" y="195" text-anchor="middle" fill="#8b949e" font-size="12">Pods (scale out under load)</text>
  <rect x="100" y="210" width="90" height="50" rx="6" fill="#1a3a2a" stroke="#3fb950" stroke-width="2"/>
  <text x="145" y="240" text-anchor="middle" fill="#3fb950" font-size="12">Pod 1</text>
  <text x="145" y="255" text-anchor="middle" fill="#8b949e" font-size="10">CPU: 80%</text>

  <rect x="210" y="210" width="90" height="50" rx="6" fill="#1a3a2a" stroke="#3fb950" stroke-width="2"/>
  <text x="255" y="240" text-anchor="middle" fill="#3fb950" font-size="12">Pod 2</text>
  <text x="255" y="255" text-anchor="middle" fill="#8b949e" font-size="10">CPU: 75%</text>

  <rect x="320" y="210" width="90" height="50" rx="6" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="365" y="240" text-anchor="middle" fill="#58a6ff" font-size="12">Pod 3</text>
  <text x="365" y="255" text-anchor="middle" fill="#8b949e" font-size="10">scaling up</text>

  <rect x="430" y="210" width="90" height="50" rx="6" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="475" y="240" text-anchor="middle" fill="#58a6ff" font-size="12">Pod 4</text>
  <text x="475" y="255" text-anchor="middle" fill="#8b949e" font-size="10">scaling up</text>

  <!-- Formula box -->
  <rect x="80" y="300" width="640" height="90" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="325" text-anchor="middle" fill="#f0883e" font-size="13" font-weight="bold">Scaling Formula</text>
  <text x="400" y="350" text-anchor="middle" fill="#e6edf3" font-size="12">desiredReplicas = ceil( currentReplicas × ( currentMetric / desiredMetric ) )</text>
  <text x="400" y="372" text-anchor="middle" fill="#8b949e" font-size="11">Example: 2 pods at 80% CPU, target 50% → ceil(2 × 80/50) = ceil(3.2) = 4 pods</text>

  <defs>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/></marker>
  </defs>
</svg>
