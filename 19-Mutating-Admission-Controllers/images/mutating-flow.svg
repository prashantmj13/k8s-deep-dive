<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="1200" height="600" fill="#f8fafc"/>
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Mutating Admission Webhook &#8212; Modify-Then-Persist</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">Returns a JSON Patch that the API server applies before validation</text>

  <!-- User submits -->
  <g filter="url(#sh)"><rect x="60" y="100" width="220" height="140" rx="10" fill="#fef3c7" stroke="#854d0e" stroke-width="2"/><text x="170" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">User submits Pod</text><text x="80" y="150" font-size="11" font-family="Consolas, monospace" fill="#0f172a">apiVersion: v1</text><text x="80" y="166" font-size="11" font-family="Consolas, monospace" fill="#0f172a">kind: Pod</text><text x="80" y="182" font-size="11" font-family="Consolas, monospace" fill="#0f172a">spec:</text><text x="95" y="198" font-size="11" font-family="Consolas, monospace" fill="#0f172a">containers:</text><text x="110" y="214" font-size="11" font-family="Consolas, monospace" fill="#0f172a">- name: app</text><text x="110" y="230" font-size="11" font-family="Consolas, monospace" fill="#0f172a">  image: myapp</text></g>

  <line x1="285" y1="170" x2="325" y2="170" stroke="#1f2937" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- API + Mutating -->
  <g filter="url(#sh)"><rect x="330" y="120" width="200" height="100" rx="10" fill="#0d9488"/><text x="430" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="white">Mutating webhook</text><text x="430" y="170" text-anchor="middle" font-size="11" fill="#ccfbf1">receives AdmissionReview</text><text x="430" y="186" text-anchor="middle" font-size="11" fill="#ccfbf1">computes JSON Patch</text><text x="430" y="206" text-anchor="middle" font-size="10" fill="#ccfbf1" font-style="italic">e.g., add sidecar</text></g>

  <line x1="430" y1="220" x2="430" y2="270" stroke="#0d9488" stroke-width="3" marker-end="url(#ar)"/>
  <text x="450" y="250" font-size="11" fill="#115e59" font-style="italic">JSON Patch</text>

  <!-- Mutated object -->
  <g filter="url(#sh)"><rect x="320" y="280" width="220" height="200" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/><text x="430" y="305" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">After mutation</text><text x="340" y="330" font-size="11" font-family="Consolas, monospace" fill="#0f172a">spec:</text><text x="355" y="346" font-size="11" font-family="Consolas, monospace" fill="#0f172a">containers:</text><text x="370" y="362" font-size="11" font-family="Consolas, monospace" fill="#0f172a">- name: app</text><text x="370" y="378" font-size="11" font-family="Consolas, monospace" fill="#0f172a">  image: myapp</text><text x="370" y="394" font-size="11" font-family="Consolas, monospace" fill="#0f172a">- name: istio-proxy</text><text x="370" y="410" font-size="11" font-family="Consolas, monospace" fill="#0f172a">  image: envoy:1.30</text><text x="355" y="426" font-size="11" font-family="Consolas, monospace" fill="#0f172a">initContainers:</text><text x="370" y="442" font-size="11" font-family="Consolas, monospace" fill="#0f172a">- name: istio-init</text><text x="340" y="464" font-size="9" fill="#475569" font-style="italic">labels added too: istio-injected=true</text></g>

  <line x1="540" y1="380" x2="580" y2="380" stroke="#1f2937" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- Validation -->
  <g filter="url(#sh)"><rect x="580" y="320" width="200" height="120" rx="10" fill="#dc2626"/><text x="680" y="348" text-anchor="middle" font-size="13" font-weight="700" fill="white">Validating</text><text x="680" y="368" text-anchor="middle" font-size="11" fill="#fee2e2">sees mutated form</text><text x="680" y="385" text-anchor="middle" font-size="11" fill="#fee2e2">checks policies</text><text x="680" y="408" text-anchor="middle" font-size="10" fill="#fee2e2" font-style="italic">if rejected, mutation</text><text x="680" y="422" text-anchor="middle" font-size="10" fill="#fee2e2" font-style="italic">is also rolled back</text></g>

  <line x1="780" y1="380" x2="820" y2="380" stroke="#1f2937" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- etcd -->
  <g filter="url(#sh)"><rect x="820" y="340" width="200" height="80" rx="10" fill="#0891b2"/><text x="920" y="370" text-anchor="middle" font-size="13" font-weight="700" fill="white">Persisted</text><text x="920" y="390" text-anchor="middle" font-size="11" fill="#cffafe">etcd holds the</text><text x="920" y="406" text-anchor="middle" font-size="11" fill="#cffafe">mutated object</text></g>

  <!-- Common uses -->
  <rect x="60" y="510" width="1080" height="80" rx="14" fill="#fef3c7" stroke="#854d0e" stroke-width="2"/>
  <text x="80" y="535" font-size="14" font-weight="700" fill="#713f12">Real-world mutating webhooks</text>
  <text x="80" y="555" font-size="11" fill="#0f172a">&#8226; <tspan font-weight="700">Istio sidecar injection</tspan> &#8226; <tspan font-weight="700">Linkerd / Cilium proxy</tspan> &#8226; <tspan font-weight="700">cert-manager</tspan> (defaulting Issuer types)</text>
  <text x="80" y="573" font-size="11" fill="#0f172a">&#8226; <tspan font-weight="700">Kyverno mutate rules</tspan> &#8226; <tspan font-weight="700">vault agent injection</tspan> (volumes &amp; init containers for secrets)</text>
</svg>
