<text x="240" y="73" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">LoadBalancer</text>
<text x="240" y="91" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">Service (1 only)</text>
<line x1="310" y1="80" x2="350" y2="80" stroke="#58a6ff" stroke-width="2"/>
<rect x="350" y="40" width="160" height="280" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
<text x="430" y="65" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Ingress</text>
<text x="430" y="83" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Controller</text>
<text x="430" y="105" text-anchor="middle" fill="#8b949e" font-size="10">Reads Ingress rules:</text>
