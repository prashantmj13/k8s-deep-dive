<svg viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
<rect width="820" height="400" fill="#0d1117"/>
<text x="410" y="30" text-anchor="middle" fill="#58a6ff" font-size="17" font-weight="bold">Ingress Controller Routing</text>
<rect x="20" y="50" width="110" height="60" rx="8" fill="#2d1f5f" stroke="#d2a8ff" stroke-width="2"/>
<text x="75" y="78" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="bold">Internet</text>
<text x="75" y="98" text-anchor="middle" fill="#8b949e" font-size="10">Client</text>
<line x1="130" y1="80" x2="170" y2="80" stroke="#d2a8ff" stroke-width="2"/>
