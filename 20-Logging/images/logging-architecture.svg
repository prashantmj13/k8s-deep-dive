<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="#f8fafc"/>
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Logging in Kubernetes &#8212; Three Layers</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">Container stdout/stderr &#8594; Node files &#8594; Cluster-level aggregation</text>

  <!-- Layer 1: Container -->
  <g filter="url(#sh)">
    <rect x="60" y="100" width="1080" height="170" rx="14" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  </g>
  <text x="80" y="125" font-size="15" font-weight="700" fill="#14532d">1. Container layer &#8212; what your app emits</text>

  <g filter="url(#sh)"><rect x="80" y="140" width="200" height="100" rx="8" fill="#16a34a"/><text x="180" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="white">Your app</text><text x="180" y="195" text-anchor="middle" font-size="10" fill="#dcfce7">writes to stdout</text><text x="180" y="210" text-anchor="middle" font-size="10" fill="#dcfce7">writes to stderr</text><text x="180" y="226" text-anchor="middle" font-size="9" fill="#dcfce7" font-style="italic">do NOT log to files</text></g>

  <line x1="285" y1="190" x2="325" y2="190" stroke="#1f2937" stroke-width="2" marker-end="url(#ar)"/>

  <g filter="url(#sh)"><rect x="330" y="140" width="220" height="100" rx="8" fill="#0d9488"/><text x="440" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="white">Container runtime</text><text x="440" y="190" text-anchor="middle" font-size="10" fill="#ccfbf1">containerd / CRI-O</text><text x="440" y="206" text-anchor="middle" font-size="10" fill="#ccfbf1">captures stdout/stderr</text><text x="440" y="222" text-anchor="middle" font-size="10" fill="#ccfbf1">writes JSON file</text></g>

  <line x1="555" y1="190" x2="595" y2="190" stroke="#1f2937" stroke-width="2" marker-end="url(#ar)"/>

  <g filter="url(#sh)"><rect x="600" y="140" width="220" height="100" rx="8" fill="#3b82f6"/><text x="710" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="white">kubelet</text><text x="710" y="190" text-anchor="middle" font-size="10" fill="#dbeafe">creates symlinks at</text><text x="710" y="208" font-size="10" font-family="Consolas, monospace" fill="#dbeafe">/var/log/pods/&lt;pod&gt;/</text><text x="710" y="224" font-size="10" font-family="Consolas, monospace" fill="#dbeafe">/var/log/containers/</text></g>

  <line x1="825" y1="190" x2="865" y2="190" stroke="#1f2937" stroke-width="2" marker-end="url(#ar)"/>

  <g filter="url(#sh)"><rect x="870" y="140" width="250" height="100" rx="8" fill="#7c3aed"/><text x="995" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="white">kubectl logs</text><text x="995" y="190" text-anchor="middle" font-size="10" fill="#ede9fe">streams from API server,</text><text x="995" y="208" text-anchor="middle" font-size="10" fill="#ede9fe">which proxies to kubelet,</text><text x="995" y="224" text-anchor="middle" font-size="10" fill="#ede9fe">which reads the file.</text></g>

  <!-- Layer 2: Node -->
  <g filter="url(#sh)">
    <rect x="60" y="290" width="1080" height="200" rx="14" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
  </g>
  <text x="80" y="315" font-size="15" font-weight="700" fill="#1e3a8a">2. Node layer &#8212; logs on disk + log rotation</text>

  <text x="80" y="345" font-size="11" font-family="Consolas, monospace" fill="#0f172a">/var/log/containers/&lt;pod&gt;_&lt;ns&gt;_&lt;container&gt;-&lt;hash&gt;.log     # symlinks (used by collectors)</text>
  <text x="80" y="363" font-size="11" font-family="Consolas, monospace" fill="#0f172a">/var/log/pods/&lt;ns&gt;_&lt;pod&gt;_&lt;uid&gt;/&lt;container&gt;/0.log         # actual files</text>
  <text x="80" y="381" font-size="11" font-family="Consolas, monospace" fill="#0f172a">/var/lib/containerd/...                                        # raw runtime files</text>

  <text x="80" y="412" font-size="13" font-weight="700" fill="#1e3a8a">Log rotation (kubelet config)</text>
  <text x="80" y="430" font-size="11" fill="#0f172a">&#8226; <tspan font-family="Consolas, monospace">containerLogMaxSize</tspan> &#8212; default 10Mi (rotate when log file reaches this size)</text>
  <text x="80" y="448" font-size="11" fill="#0f172a">&#8226; <tspan font-family="Consolas, monospace">containerLogMaxFiles</tspan> &#8212; default 5 (keep N rotated files; older ones deleted)</text>
  <text x="80" y="466" font-size="11" fill="#0f172a">&#8226; When pod is deleted, ALL its log files are deleted &#8212; <tspan font-weight="700">no logs survive pod deletion</tspan> without a collector</text>

  <!-- Layer 3: Cluster -->
  <g filter="url(#sh)">
    <rect x="60" y="510" width="1080" height="270" rx="14" fill="#fef3c7" stroke="#854d0e" stroke-width="2"/>
  </g>
  <text x="80" y="535" font-size="15" font-weight="700" fill="#713f12">3. Cluster layer &#8212; centralize logs before pods die</text>

  <g filter="url(#sh)"><rect x="80" y="555" width="240" height="190" rx="10" fill="#f59e0b"/><text x="200" y="585" text-anchor="middle" font-size="13" font-weight="700" fill="white">Node-level DaemonSet</text><text x="200" y="605" text-anchor="middle" font-size="10" fill="#fff7ed">fluent-bit / vector / fluentd</text><text x="200" y="625" text-anchor="middle" font-size="10" fill="#fff7ed">runs on every node</text><text x="200" y="645" text-anchor="middle" font-size="10" fill="#fff7ed">tails /var/log/containers/</text><text x="200" y="665" text-anchor="middle" font-size="10" fill="#fff7ed">parses, enriches, ships</text><text x="200" y="690" text-anchor="middle" font-size="10" fill="#fff7ed" font-style="italic">most common pattern</text><text x="200" y="710" text-anchor="middle" font-size="9" fill="#fff7ed">+ low overhead</text><text x="200" y="725" text-anchor="middle" font-size="9" fill="#fff7ed">- one collector per node</text></g>

  <g filter="url(#sh)"><rect x="340" y="555" width="240" height="190" rx="10" fill="#ea580c"/><text x="460" y="585" text-anchor="middle" font-size="13" font-weight="700" fill="white">Sidecar collector</text><text x="460" y="605" text-anchor="middle" font-size="10" fill="#ffedd5">extra container in each pod</text><text x="460" y="625" text-anchor="middle" font-size="10" fill="#ffedd5">tails /shared/*.log</text><text x="460" y="645" text-anchor="middle" font-size="10" fill="#ffedd5">re-emits to its stdout</text><text x="460" y="665" text-anchor="middle" font-size="10" fill="#ffedd5">OR ships to backend</text><text x="460" y="690" text-anchor="middle" font-size="10" fill="#ffedd5" font-style="italic">use for legacy apps</text><text x="460" y="710" text-anchor="middle" font-size="9" fill="#ffedd5">+ multi-format support</text><text x="460" y="725" text-anchor="middle" font-size="9" fill="#ffedd5">- one collector per pod</text></g>

  <g filter="url(#sh)"><rect x="600" y="555" width="240" height="190" rx="10" fill="#dc2626"/><text x="720" y="585" text-anchor="middle" font-size="13" font-weight="700" fill="white">App-direct shipping</text><text x="720" y="605" text-anchor="middle" font-size="10" fill="#fee2e2">app uses an SDK</text><text x="720" y="625" text-anchor="middle" font-size="10" fill="#fee2e2">to send logs directly</text><text x="720" y="645" text-anchor="middle" font-size="10" fill="#fee2e2">to backend (HTTP/gRPC)</text><text x="720" y="690" text-anchor="middle" font-size="10" fill="#fee2e2" font-style="italic">rarely recommended</text><text x="720" y="710" text-anchor="middle" font-size="9" fill="#fee2e2">- couples app to backend</text><text x="720" y="725" text-anchor="middle" font-size="9" fill="#fee2e2">- harder to debug</text></g>

  <g filter="url(#sh)"><rect x="860" y="555" width="260" height="190" rx="10" fill="#0891b2"/><text x="990" y="585" text-anchor="middle" font-size="13" font-weight="700" fill="white">Backends (where logs go)</text><text x="990" y="610" text-anchor="middle" font-size="10" fill="#cffafe">Loki + Grafana</text><text x="990" y="625" text-anchor="middle" font-size="10" fill="#cffafe">Elasticsearch + Kibana</text><text x="990" y="640" text-anchor="middle" font-size="10" fill="#cffafe">Splunk</text><text x="990" y="655" text-anchor="middle" font-size="10" fill="#cffafe">CloudWatch / GCP Logs</text><text x="990" y="670" text-anchor="middle" font-size="10" fill="#cffafe">Datadog / New Relic</text><text x="990" y="700" text-anchor="middle" font-size="10" fill="#cffafe" font-style="italic">indexing, search,</text><text x="990" y="715" text-anchor="middle" font-size="10" fill="#cffafe" font-style="italic">long-term retention</text></g>
</svg>
