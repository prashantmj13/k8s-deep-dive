<svg viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg" font-family="monospace"><rect width="820" height="400" fill="#0d1117"/><text x="410" y="32" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="bold">Volume Mounting Patterns</text><rect x="20" y="55" width="370" height="150" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1"/><text x="205" y="78" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">Basic Mount Pattern</text><text x="50" y="100" fill="#8b949e" font-size="10">spec:</text><text x="50" y="116" fill="#8b949e" font-size="10">  volumes:</text><text x="50" y="132" fill="#3fb950" font-size="10">  - name: my-vol     # 1. declare</text><text x="50" y="148" fill="#3fb950" font-size="10">    emptyDir: {}</text><text x="50" y="164" fill="#8b949e" font-size="10">  containers:</text><text x="50" y="180" fill="#d2a8ff" font-size="10">    volumeMounts:</text><text x="50" y="196" fill="#d2a8ff" font-size="10">    - name: my-vol    # 2. reference + mount</text><text x="50" y="196" fill="#d2a8ff" font-size="10">    - name: my-vol    # 2. reference + mount</text><rect x="430" y="55" width="370" height="150" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1"/><text x="615" y="78" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">subPath: Single File Injection</text><text x="460" y="100" fill="#8b949e" font-size="10">volumeMounts:</text><text x="460" y="116" fill="#f0883e" font-size="10">- name: cfg</text><text x="460" y="132" fill="#f0883e" font-size="10">  mountPath: /etc/nginx/nginx.conf</text><text x="460" y="148" fill="#3fb950" font-size="10">  subPath: nginx.conf  # only this key</text><text x="460" y="170" fill="#8b949e" font-size="10">Without subPath: entire dir replaced</text><text x="460" y="186" fill="#3fb950" font-size="10">With subPath: only one file injected</text><rect x="20" y="225" width="370" height="155" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1"/><text x="205" y="248" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Sidecar Shared Volume</text><rect x="40" y="260" width="150" height="100" rx="6" fill="#1a3a2a" stroke="#3fb950" stroke-width="1"/><text x="115" y="283" text-anchor="middle" fill="#3fb950" font-size="11">app container</text><text x="115" y="303" text-anchor="middle" fill="#8b949e" font-size="10">writes to /logs</text><text x="115" y="323" text-anchor="middle" fill="#3fb950" font-size="10">RW mount</text><rect x="215" y="260" width="150" height="100" rx="6" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1"/><text x="290" y="283" text-anchor="middle" fill="#58a6ff" font-size="11">sidecar container</text><text x="290" y="303" text-anchor="middle" fill="#8b949e" font-size="10">reads from /logs</text><text x="290" y="323" text-anchor="middle" fill="#58a6ff" font-size="10">RO mount</text><text x="205" y="360" text-anchor="middle" fill="#8b949e" font-size="10">shared emptyDir volume</text><rect x="430" y="225" width="370" height="155" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1"/><text x="615" y="248" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="bold">Common Mistakes</text><text x="455" y="272" fill="#f85149" font-size="10">x  name mismatch between volumes and mounts</text><text x="455" y="292" fill="#f85149" font-size="10">x  mountPath replaces existing image directory</text><text x="455" y="312" fill="#f85149" font-size="10">x  secret not readOnly (security risk)</text><text x="455" y="332" fill="#f85149" font-size="10">x  PVC not bound - pod stuck Pending</text><text x="455" y="352" fill="#3fb950" font-size="10">Use subPath to avoid dir replacement</text><text x="455" y="370" fill="#3fb950" font-size="10">Always readOnly: true on secrets/configs</text></svg>