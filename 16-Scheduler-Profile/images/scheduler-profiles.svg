<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Scheduler Profiles</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">One kube-scheduler binary, multiple personas &#8226; Each profile is a named set of plugins</text>

  <!-- Single binary with multiple profiles -->
  <g filter="url(#sh)">
    <rect x="120" y="100" width="960" height="280" rx="14" fill="#0d9488" stroke="#115e59" stroke-width="2"/>
  </g>
  <text x="600" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="white">kube-scheduler binary (single process)</text>

  <g filter="url(#sh)">
    <rect x="160" y="160" width="270" height="190" rx="10" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
    <text x="295" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Profile: default-scheduler</text>
    <text x="180" y="208" font-size="11" fill="#0f172a">Standard plugins:</text>
    <text x="190" y="226" font-size="10" fill="#0f172a">&#8226; NodeResourcesFit</text>
    <text x="190" y="241" font-size="10" fill="#0f172a">&#8226; NodeAffinity</text>
    <text x="190" y="256" font-size="10" fill="#0f172a">&#8226; PodTopologySpread</text>
    <text x="190" y="271" font-size="10" fill="#0f172a">&#8226; DefaultBinder</text>
    <text x="190" y="286" font-size="10" fill="#0f172a">&#8226; ImageLocality</text>
    <text x="180" y="312" font-size="10" font-style="italic" fill="#475569">general-purpose, balanced</text>
    <text x="180" y="335" font-size="11" font-family="Consolas, monospace" fill="#0f172a">scheduler use: default</text>
  </g>

  <g filter="url(#sh)">
    <rect x="465" y="160" width="270" height="190" rx="10" fill="#fef3c7" stroke="#854d0e" stroke-width="2"/>
    <text x="600" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">Profile: pack-it-in</text>
    <text x="485" y="208" font-size="11" fill="#0f172a">Bin-pack plugins enabled:</text>
    <text x="495" y="226" font-size="10" fill="#0f172a">&#8226; NodeResourcesFit (MostAllocated)</text>
    <text x="495" y="241" font-size="10" fill="#0f172a">&#8226; ImageLocality (off)</text>
    <text x="485" y="270" font-size="11" fill="#0f172a">Effect: cram pods onto few</text>
    <text x="485" y="285" font-size="11" fill="#0f172a">nodes, leaving others empty</text>
    <text x="485" y="312" font-size="10" font-style="italic" fill="#475569">good for cost optimization</text>
    <text x="485" y="335" font-size="11" font-family="Consolas, monospace" fill="#0f172a">scheduler use: pack-it-in</text>
  </g>

  <g filter="url(#sh)">
    <rect x="770" y="160" width="270" height="190" rx="10" fill="#fee2e2" stroke="#7f1d1d" stroke-width="2"/>
    <text x="905" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">Profile: spread-out</text>
    <text x="790" y="208" font-size="11" fill="#0f172a">Spread plugins enabled:</text>
    <text x="800" y="226" font-size="10" fill="#0f172a">&#8226; NodeResourcesFit (LeastAlloc)</text>
    <text x="800" y="241" font-size="10" fill="#0f172a">&#8226; PodTopologySpread (high weight)</text>
    <text x="790" y="270" font-size="11" fill="#0f172a">Effect: spread pods evenly</text>
    <text x="790" y="285" font-size="11" fill="#0f172a">across nodes / zones</text>
    <text x="790" y="312" font-size="10" font-style="italic" fill="#475569">good for resilience</text>
    <text x="790" y="335" font-size="11" font-family="Consolas, monospace" fill="#0f172a">scheduler use: spread-out</text>
  </g>

  <!-- Plugin extension points -->
  <text x="600" y="425" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Plugin extension points (where you can swap behavior)</text>

  <rect x="60" y="450" width="1080" height="40" fill="#1e293b"/>
  <text x="80" y="475" font-size="12" font-weight="700" fill="white">Stage</text>
  <text x="350" y="475" font-size="12" font-weight="700" fill="white">Plugin types</text>
  <text x="780" y="475" font-size="12" font-weight="700" fill="white">Common plugins</text>

  <g font-size="11" fill="#0f172a">
    <rect x="60" y="490" width="1080" height="32" fill="#f1f5f9"/>
    <text x="80" y="510" font-weight="700">QueueSort</text>
    <text x="350" y="510">order pending pods</text>
    <text x="780" y="510">PrioritySort (default)</text>

    <rect x="60" y="522" width="1080" height="32" fill="#ffffff"/>
    <text x="80" y="542" font-weight="700">Filter</text>
    <text x="350" y="542">eliminate infeasible nodes</text>
    <text x="780" y="542">NodeResourcesFit, NodeAffinity, TaintToleration</text>

    <rect x="60" y="554" width="1080" height="32" fill="#f1f5f9"/>
    <text x="80" y="574" font-weight="700">Score</text>
    <text x="350" y="574">rank feasible nodes</text>
    <text x="780" y="574">NodeResourcesBalancedAllocation, ImageLocality, PodTopologySpread</text>

    <rect x="60" y="586" width="1080" height="32" fill="#ffffff"/>
    <text x="80" y="606" font-weight="700">Reserve / Permit</text>
    <text x="350" y="606">post-decision hooks</text>
    <text x="780" y="606">VolumeBinding (reserves PV)</text>

    <rect x="60" y="618" width="1080" height="32" fill="#f1f5f9"/>
    <text x="80" y="638" font-weight="700">Bind</text>
    <text x="350" y="638">finalize the assignment</text>
    <text x="780" y="638">DefaultBinder (PATCH spec.nodeName)</text>

    <rect x="60" y="650" width="1080" height="32" fill="#ffffff"/>
    <text x="80" y="670" font-weight="700">PreEnqueue / PreFilter / PostBind</text>
    <text x="350" y="670">earlier and later hooks</text>
    <text x="780" y="670">advanced custom plugins</text>
  </g>
</svg>
