<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <rect width="800" height="380" fill="#0d1117"/>
  <text x="400" y="35" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="bold">In-place Pod Resource Resize</text>

  <!-- Traditional way -->
  <rect x="30" y="60" width="340" height="280" rx="8" fill="#161b22" stroke="#f85149" stroke-width="1"/>
  <text x="200" y="85" text-anchor="middle" fill="#f85149" font-size="13" font-weight="bold">❌ Traditional (Rolling Update)</text>
  <rect x="60" y="100" width="120" height="60" rx="6" fill="#3a1a1a" stroke="#f85149" stroke-width="2"/>
  <text x="120" y="126" text-anchor="middle" fill="#f85149" font-size="12">Old Pod</text>
  <text x="120" y="144" text-anchor="middle" fill="#8b949e" font-size="10">cpu: 200m</text>
  <text x="220" y="136" text-anchor="middle" fill="#8b949e" font-size="20">→</text>
  <rect x="240" y="100" width="100" height="60" rx="6" fill="#1a3a2a" stroke="#3fb950" stroke-width="2"/>
  <text x="290" y="126" text-anchor="middle" fill="#3fb950" font-size="12">New Pod</text>
  <text x="290" y="144" text-anchor="middle" fill="#8b949e" font-size="10">cpu: 400m</text>
  <text x="200" y="195" text-anchor="middle" fill="#8b949e" font-size="11">1. Terminate old pod</text>
  <text x="200" y="213" text-anchor="middle" fill="#8b949e" font-size="11">2. Schedule new pod</text>
  <text x="200" y="231" text-anchor="middle" fill="#8b949e" font-size="11">3. Pull image (maybe)</text>
  <text x="200" y="249" text-anchor="middle" fill="#8b949e" font-size="11">4. Wait for startup probes</text>
  <rect x="60" y="270" width="280" height="40" rx="6" fill="#3a1a1a" stroke="#f85149" stroke-width="1"/>
  <text x="200" y="295" text-anchor="middle" fill="#f85149" font-size="11">Pod churn — slow, disruptive</text>

  <!-- In-place way -->
  <rect x="430" y="60" width="340" height="280" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="600" y="85" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="bold">✅ In-place Resize</text>
  <rect x="490" y="100" width="220" height="80" rx="6" fill="#1a3a2a" stroke="#3fb950" stroke-width="2"/>
  <text x="600" y="128" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="bold">Same Pod — Still Running</text>
  <text x="600" y="148" text-anchor="middle" fill="#8b949e" font-size="11">cpu: 200m  →  400m  (hot patch)</text>
  <text x="600" y="163" text-anchor="middle" fill="#8b949e" font-size="11">memory: 128Mi → 256Mi (restart)</text>

  <text x="600" y="215" text-anchor="middle" fill="#8b949e" font-size="11">CPU: NotRequired → no restart</text>
  <text x="600" y="233" text-anchor="middle" fill="#8b949e" font-size="11">Memory: RestartContainer → 1 restart</text>
  <text x="600" y="251" text-anchor="middle" fill="#8b949e" font-size="11">No new pod scheduling needed</text>
  <rect x="460" y="270" width="280" height="40" rx="6" fill="#1a3a2a" stroke="#3fb950" stroke-width="1"/>
  <text x="600" y="295" text-anchor="middle" fill="#3fb950" font-size="11">Fast, minimal disruption</text>

  <!-- Status flow -->
  <text x="400" y="360" text-anchor="middle" fill="#8b949e" font-size="11">Resize status: Proposed → InProgress → (Deferred / Infeasible if node lacks resources)</text>
</svg>
