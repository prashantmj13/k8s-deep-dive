<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">What's Inside a Container?</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">A container is just a Linux process — isolated by namespaces, limited by cgroups, layered by UnionFS</text>

  <!-- Container box -->
  <rect x="50" y="100" width="1100" height="500" rx="14" fill="#fef3c7" stroke="#b45309" stroke-width="2.5"/>
  <text x="80" y="130" font-size="18" font-weight="700" fill="#78350f">Container = Process + Linux Primitives</text>

  <!-- The process -->
  <g filter="url(#sh)">
    <rect x="500" y="150" width="200" height="80" rx="10" fill="#f59e0b" stroke="#92400e" stroke-width="2"/>
    <text x="600" y="180" text-anchor="middle" font-size="15" font-weight="700" fill="white">Your Process</text>
    <text x="600" y="200" text-anchor="middle" font-size="11" fill="#fff7ed">e.g., nginx, java, python</text>
    <text x="600" y="217" text-anchor="middle" font-size="10" fill="#fff7ed" font-style="italic">PID 1 inside the container</text>
  </g>

  <!-- Namespaces section -->
  <text x="200" y="280" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">NAMESPACES (Isolation)</text>
  <text x="200" y="298" text-anchor="middle" font-size="11" fill="#475569">"What can the process SEE?"</text>

  <g filter="url(#sh)">
    <rect x="80" y="315" width="240" height="60" rx="8" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
    <text x="200" y="338" text-anchor="middle" font-size="13" font-weight="700" fill="white">PID namespace</text>
    <text x="200" y="356" text-anchor="middle" font-size="10" fill="#dbeafe">own process tree (PID 1)</text>
    <text x="200" y="370" text-anchor="middle" font-size="9" fill="#dbeafe" font-style="italic">cannot see host processes</text>
  </g>
  <g filter="url(#sh)">
    <rect x="80" y="385" width="240" height="60" rx="8" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
    <text x="200" y="408" text-anchor="middle" font-size="13" font-weight="700" fill="white">NET namespace</text>
    <text x="200" y="426" text-anchor="middle" font-size="10" fill="#dbeafe">own network interfaces, IP, routes</text>
    <text x="200" y="440" text-anchor="middle" font-size="9" fill="#dbeafe" font-style="italic">own iptables, own port space</text>
  </g>
  <g filter="url(#sh)">
    <rect x="80" y="455" width="240" height="60" rx="8" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
    <text x="200" y="478" text-anchor="middle" font-size="13" font-weight="700" fill="white">MNT namespace</text>
    <text x="200" y="496" text-anchor="middle" font-size="10" fill="#dbeafe">own filesystem mounts</text>
    <text x="200" y="510" text-anchor="middle" font-size="9" fill="#dbeafe" font-style="italic">own / root filesystem</text>
  </g>
  <g filter="url(#sh)">
    <rect x="80" y="525" width="240" height="60" rx="8" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
    <text x="200" y="548" text-anchor="middle" font-size="13" font-weight="700" fill="white">UTS / IPC / USER ns</text>
    <text x="200" y="566" text-anchor="middle" font-size="10" fill="#dbeafe">hostname / IPC / user IDs</text>
    <text x="200" y="580" text-anchor="middle" font-size="9" fill="#dbeafe" font-style="italic">remap UIDs for security</text>
  </g>

  <!-- Cgroups section -->
  <text x="600" y="280" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">CGROUPS (Resource Limits)</text>
  <text x="600" y="298" text-anchor="middle" font-size="11" fill="#475569">"How MUCH can the process use?"</text>

  <g filter="url(#sh)">
    <rect x="480" y="315" width="240" height="60" rx="8" fill="#16a34a" stroke="#14532d" stroke-width="2"/>
    <text x="600" y="338" text-anchor="middle" font-size="13" font-weight="700" fill="white">cpu cgroup</text>
    <text x="600" y="356" text-anchor="middle" font-size="10" fill="#dcfce7">CPU shares, CPU quota</text>
    <text x="600" y="370" text-anchor="middle" font-size="9" fill="#dcfce7" font-style="italic">e.g., 0.5 CPU, 2 CPU</text>
  </g>
  <g filter="url(#sh)">
    <rect x="480" y="385" width="240" height="60" rx="8" fill="#16a34a" stroke="#14532d" stroke-width="2"/>
    <text x="600" y="408" text-anchor="middle" font-size="13" font-weight="700" fill="white">memory cgroup</text>
    <text x="600" y="426" text-anchor="middle" font-size="10" fill="#dcfce7">hard memory limit</text>
    <text x="600" y="440" text-anchor="middle" font-size="9" fill="#dcfce7" font-style="italic">over limit -&gt; OOMKilled</text>
  </g>
  <g filter="url(#sh)">
    <rect x="480" y="455" width="240" height="60" rx="8" fill="#16a34a" stroke="#14532d" stroke-width="2"/>
    <text x="600" y="478" text-anchor="middle" font-size="13" font-weight="700" fill="white">io / blkio cgroup</text>
    <text x="600" y="496" text-anchor="middle" font-size="10" fill="#dcfce7">disk I/O throttling</text>
    <text x="600" y="510" text-anchor="middle" font-size="9" fill="#dcfce7" font-style="italic">read/write bandwidth</text>
  </g>
  <g filter="url(#sh)">
    <rect x="480" y="525" width="240" height="60" rx="8" fill="#16a34a" stroke="#14532d" stroke-width="2"/>
    <text x="600" y="548" text-anchor="middle" font-size="13" font-weight="700" fill="white">pids cgroup</text>
    <text x="600" y="566" text-anchor="middle" font-size="10" fill="#dcfce7">max number of processes</text>
    <text x="600" y="580" text-anchor="middle" font-size="9" fill="#dcfce7" font-style="italic">prevents fork bombs</text>
  </g>

  <!-- UnionFS section -->
  <text x="1000" y="280" text-anchor="middle" font-size="16" font-weight="700" fill="#7c2d12">UNION FILESYSTEM</text>
  <text x="1000" y="298" text-anchor="middle" font-size="11" fill="#475569">"WHAT does the process see on disk?"</text>

  <g filter="url(#sh)">
    <rect x="880" y="315" width="240" height="60" rx="8" fill="#dc2626" stroke="#7f1d1d" stroke-width="2"/>
    <text x="1000" y="338" text-anchor="middle" font-size="13" font-weight="700" fill="white">Read/Write Layer</text>
    <text x="1000" y="356" text-anchor="middle" font-size="10" fill="#fee2e2">container's writable scratch</text>
    <text x="1000" y="370" text-anchor="middle" font-size="9" fill="#fee2e2" font-style="italic">lost when container deleted</text>
  </g>
  <g filter="url(#sh)">
    <rect x="880" y="385" width="240" height="50" rx="8" fill="#ea580c" stroke="#7c2d12" stroke-width="2"/>
    <text x="1000" y="406" text-anchor="middle" font-size="12" font-weight="700" fill="white">Image Layer 3 (your app)</text>
    <text x="1000" y="423" text-anchor="middle" font-size="9" fill="#ffedd5" font-style="italic">read-only</text>
  </g>
  <g filter="url(#sh)">
    <rect x="880" y="445" width="240" height="50" rx="8" fill="#f97316" stroke="#7c2d12" stroke-width="2"/>
    <text x="1000" y="466" text-anchor="middle" font-size="12" font-weight="700" fill="white">Image Layer 2 (deps)</text>
    <text x="1000" y="483" text-anchor="middle" font-size="9" fill="#fff7ed" font-style="italic">read-only</text>
  </g>
  <g filter="url(#sh)">
    <rect x="880" y="505" width="240" height="50" rx="8" fill="#fb923c" stroke="#7c2d12" stroke-width="2"/>
    <text x="1000" y="526" text-anchor="middle" font-size="12" font-weight="700" fill="white">Image Layer 1 (base OS)</text>
    <text x="1000" y="543" text-anchor="middle" font-size="9" fill="#fff7ed" font-style="italic">read-only, often shared</text>
  </g>

  <!-- Connection arrows from process -->
  <line x1="500" y1="220" x2="320" y2="320" stroke="#1f2937" stroke-width="2"/>
  <line x1="600" y1="230" x2="600" y2="313" stroke="#1f2937" stroke-width="2"/>
  <line x1="700" y1="220" x2="880" y2="320" stroke="#1f2937" stroke-width="2"/>

  <!-- Footer note -->
  <text x="600" y="640" text-anchor="middle" font-size="12" fill="#0f172a" font-weight="700">A container is NOT a tiny VM. It is a normal process with these three Linux features applied to it.</text>
  <text x="600" y="660" text-anchor="middle" font-size="11" fill="#475569">When you `docker exec` or `kubectl exec`, you simply enter the container's namespaces.</text>
</svg>
