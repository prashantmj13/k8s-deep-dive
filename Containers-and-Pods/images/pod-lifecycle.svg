<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Pod Lifecycle</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">A pod moves through phases. Each container inside has its own state.</text>

  <!-- Pending -->
  <g filter="url(#sh)">
    <rect x="60" y="120" width="200" height="100" rx="14" fill="#94a3b8" stroke="#475569" stroke-width="2"/>
    <text x="160" y="155" text-anchor="middle" font-size="18" font-weight="700" fill="white">Pending</text>
    <text x="160" y="180" text-anchor="middle" font-size="11" fill="#f1f5f9">Pod accepted by API Server</text>
    <text x="160" y="197" text-anchor="middle" font-size="10" fill="#f1f5f9">Awaiting scheduling /</text>
    <text x="160" y="211" text-anchor="middle" font-size="10" fill="#f1f5f9">image pull / init containers</text>
  </g>

  <!-- Running -->
  <g filter="url(#sh)">
    <rect x="500" y="120" width="200" height="100" rx="14" fill="#16a34a" stroke="#14532d" stroke-width="2"/>
    <text x="600" y="155" text-anchor="middle" font-size="18" font-weight="700" fill="white">Running</text>
    <text x="600" y="180" text-anchor="middle" font-size="11" fill="#dcfce7">Bound to a node</text>
    <text x="600" y="197" text-anchor="middle" font-size="10" fill="#dcfce7">All containers created;</text>
    <text x="600" y="211" text-anchor="middle" font-size="10" fill="#dcfce7">at least one is running/starting</text>
  </g>

  <!-- Succeeded -->
  <g filter="url(#sh)">
    <rect x="900" y="60" width="200" height="100" rx="14" fill="#0891b2" stroke="#155e75" stroke-width="2"/>
    <text x="1000" y="95" text-anchor="middle" font-size="18" font-weight="700" fill="white">Succeeded</text>
    <text x="1000" y="120" text-anchor="middle" font-size="11" fill="#cffafe">All containers exited 0</text>
    <text x="1000" y="137" text-anchor="middle" font-size="10" fill="#cffafe">Job-style workloads</text>
    <text x="1000" y="151" text-anchor="middle" font-size="10" fill="#cffafe" font-style="italic">terminal state</text>
  </g>

  <!-- Failed -->
  <g filter="url(#sh)">
    <rect x="900" y="180" width="200" height="100" rx="14" fill="#dc2626" stroke="#7f1d1d" stroke-width="2"/>
    <text x="1000" y="215" text-anchor="middle" font-size="18" font-weight="700" fill="white">Failed</text>
    <text x="1000" y="240" text-anchor="middle" font-size="11" fill="#fee2e2">A container exited non-zero</text>
    <text x="1000" y="257" text-anchor="middle" font-size="10" fill="#fee2e2">and won't be restarted</text>
    <text x="1000" y="271" text-anchor="middle" font-size="10" fill="#fee2e2" font-style="italic">terminal state</text>
  </g>

  <!-- Unknown -->
  <g filter="url(#sh)">
    <rect x="500" y="270" width="200" height="80" rx="14" fill="#fbbf24" stroke="#854d0e" stroke-width="2"/>
    <text x="600" y="298" text-anchor="middle" font-size="16" font-weight="700" fill="#713f12">Unknown</text>
    <text x="600" y="320" text-anchor="middle" font-size="10" fill="#713f12">node lost contact with API server</text>
    <text x="600" y="336" text-anchor="middle" font-size="10" fill="#713f12" font-style="italic">often a network issue</text>
  </g>

  <!-- Arrows -->
  <line x1="260" y1="170" x2="498" y2="170" stroke="#1f2937" stroke-width="3" marker-end="url(#ar)"/>
  <text x="380" y="160" text-anchor="middle" font-size="11" fill="#0f172a" font-style="italic">scheduled + images pulled</text>

  <line x1="700" y1="155" x2="898" y2="120" stroke="#0891b2" stroke-width="3" marker-end="url(#ar)"/>
  <text x="800" y="125" text-anchor="middle" font-size="11" fill="#155e75" font-style="italic">all exit 0</text>

  <line x1="700" y1="185" x2="898" y2="220" stroke="#dc2626" stroke-width="3" marker-end="url(#ar)"/>
  <text x="800" y="220" text-anchor="middle" font-size="11" fill="#7f1d1d" font-style="italic">exit non-zero (no restart)</text>

  <line x1="600" y1="220" x2="600" y2="268" stroke="#854d0e" stroke-width="3" stroke-dasharray="4,3" marker-end="url(#ar)"/>
  <text x="640" y="250" font-size="11" fill="#713f12" font-style="italic">node unreachable</text>

  <!-- Container statuses inside Running -->
  <text x="600" y="400" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">Inside the Running phase, each container has its own status:</text>

  <g filter="url(#sh)">
    <rect x="100" y="430" width="240" height="90" rx="10" fill="#fbbf24" stroke="#854d0e" stroke-width="2"/>
    <text x="220" y="460" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">Waiting</text>
    <text x="220" y="483" text-anchor="middle" font-size="11" fill="#713f12">Pulling image, ContainerCreating,</text>
    <text x="220" y="500" text-anchor="middle" font-size="11" fill="#713f12">CrashLoopBackOff, ImagePullBackOff</text>
  </g>
  <g filter="url(#sh)">
    <rect x="430" y="430" width="240" height="90" rx="10" fill="#16a34a" stroke="#14532d" stroke-width="2"/>
    <text x="550" y="460" text-anchor="middle" font-size="14" font-weight="700" fill="white">Running</text>
    <text x="550" y="483" text-anchor="middle" font-size="11" fill="#dcfce7">Process is alive in the container</text>
    <text x="550" y="500" text-anchor="middle" font-size="11" fill="#dcfce7">may or may not be Ready (probes!)</text>
  </g>
  <g filter="url(#sh)">
    <rect x="760" y="430" width="240" height="90" rx="10" fill="#475569" stroke="#0f172a" stroke-width="2"/>
    <text x="880" y="460" text-anchor="middle" font-size="14" font-weight="700" fill="white">Terminated</text>
    <text x="880" y="483" text-anchor="middle" font-size="11" fill="#f1f5f9">Container exited (exit code, reason)</text>
    <text x="880" y="500" text-anchor="middle" font-size="11" fill="#f1f5f9">Completed / Error / OOMKilled</text>
  </g>

  <!-- Restart policies -->
  <text x="600" y="565" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Restart Policy (per pod) determines what happens after Terminated:</text>

  <g>
    <rect x="100" y="585" width="320" height="90" rx="8" fill="#dcfce7" stroke="#14532d"/>
    <text x="260" y="608" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Always (default)</text>
    <text x="260" y="630" text-anchor="middle" font-size="10" fill="#0f172a">Always restart the container,</text>
    <text x="260" y="646" text-anchor="middle" font-size="10" fill="#0f172a">whether it exited 0 or not.</text>
    <text x="260" y="665" text-anchor="middle" font-size="9" fill="#475569" font-style="italic">Used by Deployments, ReplicaSets, DaemonSets</text>
  </g>
  <g>
    <rect x="440" y="585" width="320" height="90" rx="8" fill="#fef3c7" stroke="#854d0e"/>
    <text x="600" y="608" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">OnFailure</text>
    <text x="600" y="630" text-anchor="middle" font-size="10" fill="#0f172a">Restart only if exit code != 0.</text>
    <text x="600" y="646" text-anchor="middle" font-size="10" fill="#0f172a">Exit 0 -&gt; pod goes to Succeeded.</text>
    <text x="600" y="665" text-anchor="middle" font-size="9" fill="#475569" font-style="italic">Used by Jobs / CronJobs</text>
  </g>
  <g>
    <rect x="780" y="585" width="320" height="90" rx="8" fill="#fee2e2" stroke="#7f1d1d"/>
    <text x="940" y="608" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">Never</text>
    <text x="940" y="630" text-anchor="middle" font-size="10" fill="#0f172a">No matter what, never restart.</text>
    <text x="940" y="646" text-anchor="middle" font-size="10" fill="#0f172a">Pod -&gt; Succeeded or Failed.</text>
    <text x="940" y="665" text-anchor="middle" font-size="9" fill="#475569" font-style="italic">Used for one-shot debugging pods</text>
  </g>
</svg>
