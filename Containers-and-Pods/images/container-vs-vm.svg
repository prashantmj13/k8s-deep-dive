<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Containers vs Virtual Machines</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">Why containers are lighter, faster, and denser than VMs</text>

  <!-- VM SIDE -->
  <text x="285" y="100" text-anchor="middle" font-size="18" font-weight="700" fill="#7c3aed">Virtual Machines</text>
  <rect x="60" y="120" width="450" height="450" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>

  <!-- VM Apps -->
  <g filter="url(#sh)">
    <rect x="80" y="140" width="130" height="60" rx="8" fill="#a78bfa" stroke="#5b21b6" stroke-width="1.5"/>
    <text x="145" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="white">App A</text>
    <text x="145" y="183" text-anchor="middle" font-size="10" fill="#ede9fe">+ libs</text>
  </g>
  <g filter="url(#sh)">
    <rect x="220" y="140" width="130" height="60" rx="8" fill="#a78bfa" stroke="#5b21b6" stroke-width="1.5"/>
    <text x="285" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="white">App B</text>
    <text x="285" y="183" text-anchor="middle" font-size="10" fill="#ede9fe">+ libs</text>
  </g>
  <g filter="url(#sh)">
    <rect x="360" y="140" width="130" height="60" rx="8" fill="#a78bfa" stroke="#5b21b6" stroke-width="1.5"/>
    <text x="425" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="white">App C</text>
    <text x="425" y="183" text-anchor="middle" font-size="10" fill="#ede9fe">+ libs</text>
  </g>

  <!-- Guest OS layers -->
  <g filter="url(#sh)">
    <rect x="80" y="210" width="130" height="80" rx="8" fill="#c4b5fd" stroke="#5b21b6" stroke-width="1.5"/>
    <text x="145" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#3b0764">Guest OS</text>
    <text x="145" y="258" text-anchor="middle" font-size="10" fill="#3b0764">Kernel</text>
    <text x="145" y="274" text-anchor="middle" font-size="9" fill="#3b0764" font-style="italic">~2GB</text>
  </g>
  <g filter="url(#sh)">
    <rect x="220" y="210" width="130" height="80" rx="8" fill="#c4b5fd" stroke="#5b21b6" stroke-width="1.5"/>
    <text x="285" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#3b0764">Guest OS</text>
    <text x="285" y="258" text-anchor="middle" font-size="10" fill="#3b0764">Kernel</text>
    <text x="285" y="274" text-anchor="middle" font-size="9" fill="#3b0764" font-style="italic">~2GB</text>
  </g>
  <g filter="url(#sh)">
    <rect x="360" y="210" width="130" height="80" rx="8" fill="#c4b5fd" stroke="#5b21b6" stroke-width="1.5"/>
    <text x="425" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#3b0764">Guest OS</text>
    <text x="425" y="258" text-anchor="middle" font-size="10" fill="#3b0764">Kernel</text>
    <text x="425" y="274" text-anchor="middle" font-size="9" fill="#3b0764" font-style="italic">~2GB</text>
  </g>

  <!-- Hypervisor -->
  <g filter="url(#sh)">
    <rect x="80" y="305" width="410" height="55" rx="8" fill="#7c3aed" stroke="#3b0764" stroke-width="2"/>
    <text x="285" y="332" text-anchor="middle" font-size="14" font-weight="700" fill="white">Hypervisor (VMware / KVM / Xen)</text>
    <text x="285" y="349" text-anchor="middle" font-size="10" fill="#ede9fe">virtualizes hardware for each VM</text>
  </g>

  <!-- Host OS -->
  <g filter="url(#sh)">
    <rect x="80" y="370" width="410" height="50" rx="8" fill="#5b21b6" stroke="#3b0764" stroke-width="2"/>
    <text x="285" y="395" text-anchor="middle" font-size="14" font-weight="700" fill="white">Host OS</text>
    <text x="285" y="411" text-anchor="middle" font-size="10" fill="#ede9fe">(may not be needed for Type-1)</text>
  </g>

  <!-- Hardware -->
  <g filter="url(#sh)">
    <rect x="80" y="430" width="410" height="50" rx="8" fill="#1e293b" stroke="#020617" stroke-width="2"/>
    <text x="285" y="455" text-anchor="middle" font-size="14" font-weight="700" fill="white">Physical Hardware</text>
    <text x="285" y="471" text-anchor="middle" font-size="10" fill="#cbd5e1">CPU, RAM, Disk, NIC</text>
  </g>

  <!-- VM properties -->
  <text x="80" y="510" font-size="12" font-weight="700" fill="#3b0764">Properties:</text>
  <text x="80" y="530" font-size="11" fill="#0f172a">&#8226; Boot time: 30-60 seconds</text>
  <text x="80" y="548" font-size="11" fill="#0f172a">&#8226; Memory overhead: GBs per VM</text>
  <text x="80" y="566" font-size="11" fill="#0f172a">&#8226; Strong isolation (full kernel)</text>

  <!-- CONTAINER SIDE -->
  <text x="915" y="100" text-anchor="middle" font-size="18" font-weight="700" fill="#16a34a">Containers</text>
  <rect x="690" y="120" width="450" height="450" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>

  <!-- Container Apps -->
  <g filter="url(#sh)">
    <rect x="710" y="140" width="130" height="60" rx="8" fill="#22c55e" stroke="#14532d" stroke-width="1.5"/>
    <text x="775" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="white">App A</text>
    <text x="775" y="183" text-anchor="middle" font-size="10" fill="#dcfce7">+ libs</text>
  </g>
  <g filter="url(#sh)">
    <rect x="850" y="140" width="130" height="60" rx="8" fill="#22c55e" stroke="#14532d" stroke-width="1.5"/>
    <text x="915" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="white">App B</text>
    <text x="915" y="183" text-anchor="middle" font-size="10" fill="#dcfce7">+ libs</text>
  </g>
  <g filter="url(#sh)">
    <rect x="990" y="140" width="130" height="60" rx="8" fill="#22c55e" stroke="#14532d" stroke-width="1.5"/>
    <text x="1055" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="white">App C</text>
    <text x="1055" y="183" text-anchor="middle" font-size="10" fill="#dcfce7">+ libs</text>
  </g>

  <!-- Container Runtime -->
  <g filter="url(#sh)">
    <rect x="710" y="220" width="410" height="55" rx="8" fill="#0d9488" stroke="#115e59" stroke-width="2"/>
    <text x="915" y="247" text-anchor="middle" font-size="14" font-weight="700" fill="white">Container Runtime (containerd / CRI-O)</text>
    <text x="915" y="264" text-anchor="middle" font-size="10" fill="#ccfbf1">manages containers via Linux primitives</text>
  </g>

  <!-- Host OS / Kernel -->
  <g filter="url(#sh)">
    <rect x="710" y="285" width="410" height="120" rx="8" fill="#16a34a" stroke="#14532d" stroke-width="2"/>
    <text x="915" y="312" text-anchor="middle" font-size="15" font-weight="700" fill="white">Host OS — Linux Kernel (shared!)</text>
    <text x="915" y="335" text-anchor="middle" font-size="11" fill="#dcfce7">Namespaces (isolation) &#8226; Cgroups (limits) &#8226; UnionFS (layers)</text>
    <line x1="730" y1="350" x2="1100" y2="350" stroke="#dcfce7" stroke-width="0.8"/>
    <text x="915" y="370" text-anchor="middle" font-size="10" fill="#dcfce7">All containers share THIS kernel — no extra OS per app.</text>
    <text x="915" y="388" text-anchor="middle" font-size="10" fill="#dcfce7">This is why containers are MB, not GB.</text>
  </g>

  <!-- Hardware -->
  <g filter="url(#sh)">
    <rect x="710" y="430" width="410" height="50" rx="8" fill="#1e293b" stroke="#020617" stroke-width="2"/>
    <text x="915" y="455" text-anchor="middle" font-size="14" font-weight="700" fill="white">Physical Hardware</text>
    <text x="915" y="471" text-anchor="middle" font-size="10" fill="#cbd5e1">CPU, RAM, Disk, NIC</text>
  </g>

  <!-- Container properties -->
  <text x="710" y="510" font-size="12" font-weight="700" fill="#14532d">Properties:</text>
  <text x="710" y="530" font-size="11" fill="#0f172a">&#8226; Boot time: ~milliseconds</text>
  <text x="710" y="548" font-size="11" fill="#0f172a">&#8226; Memory overhead: MBs per container</text>
  <text x="710" y="566" font-size="11" fill="#0f172a">&#8226; Process-level isolation (shared kernel)</text>
</svg>
