<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="600" fill="#f8fafc"/>
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Commands &amp; Arguments &#8212; Mapping to Docker</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">K8s <tspan font-family="Consolas, monospace">command</tspan> = Docker ENTRYPOINT &#8226; K8s <tspan font-family="Consolas, monospace">args</tspan> = Docker CMD</text>

  <rect x="60" y="100" width="1080" height="40" fill="#1e293b"/>
  <text x="80" y="125" font-size="12" font-weight="700" fill="white">Dockerfile</text>
  <text x="500" y="125" font-size="12" font-weight="700" fill="white">Pod spec</text>
  <text x="900" y="125" font-size="12" font-weight="700" fill="white">Final command</text>

  <g font-size="11" fill="#0f172a">
    <rect x="60" y="140" width="1080" height="50" fill="#f1f5f9"/>
    <text x="80" y="165" font-family="Consolas, monospace">ENTRYPOINT ["/bin/app"]</text>
    <text x="80" y="180" font-family="Consolas, monospace">CMD ["--port=8080"]</text>
    <text x="500" y="170" font-family="Consolas, monospace">(no command, no args)</text>
    <text x="900" y="170" font-family="Consolas, monospace" font-weight="700">/bin/app --port=8080</text>

    <rect x="60" y="190" width="1080" height="50" fill="#ffffff"/>
    <text x="80" y="215" font-family="Consolas, monospace">ENTRYPOINT ["/bin/app"]</text>
    <text x="80" y="230" font-family="Consolas, monospace">CMD ["--port=8080"]</text>
    <text x="500" y="220" font-family="Consolas, monospace">args: ["--port=9090", "--debug"]</text>
    <text x="900" y="220" font-family="Consolas, monospace" font-weight="700">/bin/app --port=9090 --debug</text>

    <rect x="60" y="240" width="1080" height="50" fill="#f1f5f9"/>
    <text x="80" y="265" font-family="Consolas, monospace">ENTRYPOINT ["/bin/app"]</text>
    <text x="80" y="280" font-family="Consolas, monospace">CMD ["--port=8080"]</text>
    <text x="500" y="270" font-family="Consolas, monospace">command: ["/bin/other"]</text>
    <text x="900" y="270" font-family="Consolas, monospace" font-weight="700">/bin/other</text>

    <rect x="60" y="290" width="1080" height="50" fill="#ffffff"/>
    <text x="80" y="315" font-family="Consolas, monospace">ENTRYPOINT ["/bin/app"]</text>
    <text x="80" y="330" font-family="Consolas, monospace">CMD ["--port=8080"]</text>
    <text x="500" y="320" font-family="Consolas, monospace">command: ["/bin/other"]</text>
    <text x="500" y="335" font-family="Consolas, monospace">args: ["-v","go"]</text>
    <text x="900" y="320" font-family="Consolas, monospace" font-weight="700">/bin/other -v go</text>
  </g>

  <!-- Notes -->
  <rect x="60" y="370" width="1080" height="220" rx="14" fill="#fef3c7" stroke="#854d0e" stroke-width="2"/>
  <text x="80" y="397" font-size="14" font-weight="700" fill="#713f12">Key rules</text>
  <text x="80" y="423" font-size="11" fill="#0f172a">&#8226; Pod's <tspan font-family="Consolas, monospace">command</tspan> overrides image's <tspan font-family="Consolas, monospace">ENTRYPOINT</tspan>.</text>
  <text x="80" y="441" font-size="11" fill="#0f172a">&#8226; Pod's <tspan font-family="Consolas, monospace">args</tspan> overrides image's <tspan font-family="Consolas, monospace">CMD</tspan>.</text>
  <text x="80" y="459" font-size="11" fill="#0f172a">&#8226; If you set <tspan font-family="Consolas, monospace">command</tspan> but not <tspan font-family="Consolas, monospace">args</tspan>, the image&apos;s <tspan font-family="Consolas, monospace">CMD</tspan> is DROPPED &#8212; not appended.</text>
  <text x="80" y="477" font-size="11" fill="#0f172a">&#8226; Both must be JSON arrays (exec form), not shell strings, for proper signal handling.</text>
  <text x="80" y="495" font-size="11" fill="#0f172a">&#8226; Use <tspan font-family="Consolas, monospace">$(VAR_NAME)</tspan> in args/command to reference env vars (single-dollar form, NOT shell expansion).</text>
  <text x="80" y="513" font-size="11" fill="#0f172a">&#8226; To run a shell pipeline: <tspan font-family="Consolas, monospace">command: ["sh","-c","cmd1 | cmd2"]</tspan></text>
  <text x="80" y="540" font-size="11" font-weight="700" fill="#713f12">PID 1 matters</text>
  <text x="80" y="558" font-size="11" fill="#0f172a">The first arg becomes PID 1 inside the container. Make sure it handles SIGTERM (your app, not <tspan font-family="Consolas, monospace">/bin/sh -c</tspan>).</text>
  <text x="80" y="576" font-size="11" fill="#0f172a">Use <tspan font-family="Consolas, monospace">exec</tspan> in shell scripts: <tspan font-family="Consolas, monospace">command: ["sh","-c","exec /bin/app"]</tspan> so /bin/app inherits PID 1.</text>
</svg>
