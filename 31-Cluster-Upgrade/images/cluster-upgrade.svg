<svg viewBox="0 0 800 370" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <rect width="800" height="370" fill="#0d1117"/>
  <text x="400" y="32" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="bold">Cluster Upgrade Order (kubeadm)</text>
  <rect x="30" y="55" width="340" height="200" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="200" y="78" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">1 Control Plane (first)</text>
  <rect x="50" y="90" width="140" height="40" rx="5" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1"/>
  <text x="120" y="115" text-anchor="middle" fill="#e6edf3" font-size="11">kube-apiserver</text>
  <rect x="205" y="90" width="140" height="40" rx="5" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1"/>
  <text x="275" y="115" text-anchor="middle" fill="#e6edf3" font-size="11">controller-manager</text>
  <rect x="50" y="145" width="140" height="40" rx="5" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1"/>
  <text x="120" y="170" text-anchor="middle" fill="#e6edf3" font-size="11">kube-scheduler</text>
  <rect x="205" y="145" width="140" height="40" rx="5" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1"/>
  <text x="275" y="170" text-anchor="middle" fill="#e6edf3" font-size="11">etcd</text>
  <rect x="50" y="200" width="295" height="40" rx="5" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1"/>
  <text x="197" y="225" text-anchor="middle" fill="#e6edf3" font-size="11">kubelet + kubectl</text>
  <text x="390" y="160" text-anchor="middle" fill="#3fb950" font-size="28">-&gt;</text>
  <rect x="430" y="55" width="340" height="200" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="600" y="78" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="bold">2 Worker Nodes (one at a time)</text>
  <rect x="450" y="90" width="140" height="40" rx="5" fill="#1a3a2a" stroke="#3fb950" stroke-width="1"/>
  <text x="520" y="115" text-anchor="middle" fill="#e6edf3" font-size="11">node01 kubelet</text>
  <rect x="605" y="90" width="140" height="40" rx="5" fill="#1a3a2a" stroke="#3fb950" stroke-width="1"/>
  <text x="675" y="115" text-anchor="middle" fill="#e6edf3" font-size="11">node02 kubelet</text>
  <text x="600" y="160" text-anchor="middle" fill="#8b949e" font-size="11">drain -&gt; upgrade -&gt; uncordon</text>
  <rect x="30" y="278" width="740" height="75" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="400" y="300" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">Version Skew Rules</text>
  <text x="200" y="325" text-anchor="middle" fill="#8b949e" font-size="11">apiserver: N | controller/scheduler: N-1 | kubelet: N-2 | kubectl: N+/-1</text>
  <text x="400" y="345" text-anchor="middle" fill="#f85149" font-size="11">Always upgrade one minor version at a time — no skipping!</text>
</svg>
