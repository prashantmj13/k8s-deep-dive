<svg viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg" font-family="monospace"><rect width="800" height="220" fill="#0d1117"/><text x="400" y="28" text-anchor="middle" fill="#58a6ff" font-size="16" font-weight="bold">Helm Release Revision History</text><rect x="30" y="60" width="160" height="60" rx="6" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1"/><text x="110" y="85" text-anchor="middle" fill="#58a6ff" font-size="11">Rev 1: install</text><text x="110" y="103" text-anchor="middle" fill="#8b949e" font-size="9">superseded</text><rect x="220" y="60" width="160" height="60" rx="6" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1"/><text x="300" y="85" text-anchor="middle" fill="#58a6ff" font-size="11">Rev 2: upgrade</text><text x="300" y="103" text-anchor="middle" fill="#8b949e" font-size="9">superseded</text><rect x="410" y="60" width="160" height="60" rx="6" fill="#1a3a2a" stroke="#3fb950" stroke-width="2"/><text x="490" y="85" text-anchor="middle" fill="#3fb950" font-size="11">Rev 3: upgrade</text><text x="490" y="103" text-anchor="middle" fill="#3fb950" font-size="9">deployed</text><rect x="600" y="60" width="170" height="60" rx="6" fill="#2d1f5f" stroke="#d2a8ff" stroke-width="2" stroke-dasharray="4,3"/><text x="685" y="85" text-anchor="middle" fill="#d2a8ff" font-size="11">Rev 4: rollback to 1</text><text x="685" y="103" text-anchor="middle" fill="#8b949e" font-size="9">new revision added</text><text x="400" y="160" text-anchor="middle" fill="#8b949e" font-size="10">Rollback never deletes history - it creates a new revision re-applying old state</text></svg>