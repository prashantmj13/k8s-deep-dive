<svg viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg" font-family="monospace"><rect width="820" height="400" fill="#0d1117"/><text x="410" y="32" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="bold">Kubernetes Volume Types</text><rect x="30" y="55" width="175" height="310" rx="8" fill="#161b22" stroke="#30363d"/><text x="117" y="80" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">Ephemeral</text><rect x="45" y="92" width="145" height="45" rx="5" fill="#3a2010" stroke="#f0883e" stroke-width="1"/><text x="117" y="112" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">emptyDir</text><text x="117" y="130" text-anchor="middle" fill="#8b949e" font-size="9">scratch space, IPC</text><rect x="45" y="145" width="145" height="45" rx="5" fill="#3a2010" stroke="#f0883e" stroke-width="1"/><text x="117" y="165" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">configMap</text><text x="117" y="183" text-anchor="middle" fill="#8b949e" font-size="9">config files (auto-update)</text><rect x="45" y="198" width="145" height="45" rx="5" fill="#3a2010" stroke="#f0883e" stroke-width="1"/><text x="117" y="218" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">secret</text><text x="117" y="236" text-anchor="middle" fill="#8b949e" font-size="9">creds (auto-decoded)</text><rect x="45" y="251" width="145" height="45" rx="5" fill="#3a2010" stroke="#f0883e" stroke-width="1"/><text x="117" y="271" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">projected</text><text x="117" y="289" text-anchor="middle" fill="#8b949e" font-size="9">combines multiple sources</text><rect x="225" y="55" width="175" height="310" rx="8" fill="#161b22" stroke="#30363d"/><text x="312" y="80" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="bold">Node-local</text><rect x="240" y="92" width="145" height="45" rx="5" fill="#2d1f5f" stroke="#d2a8ff" stroke-width="1"/><text x="312" y="112" text-anchor="middle" fill="#d2a8ff" font-size="11" font-weight="bold">hostPath</text><text x="312" y="130" text-anchor="middle" fill="#8b949e" font-size="9">host filesystem (risky)</text><rect x="240" y="145" width="145" height="45" rx="5" fill="#2d1f5f" stroke="#d2a8ff" stroke-width="1"/><text x="312" y="165" text-anchor="middle" fill="#d2a8ff" font-size="11" font-weight="bold">local PV</text><text x="312" y="183" text-anchor="middle" fill="#8b949e" font-size="9">node-aware, with PVC</text><rect x="420" y="55" width="175" height="310" rx="8" fill="#161b22" stroke="#30363d"/><text x="507" y="80" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Network / Shared</text><rect x="435" y="92" width="145" height="45" rx="5" fill="#1a3a2a" stroke="#3fb950" stroke-width="1"/><text x="507" y="112" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">nfs</text><text x="507" y="130" text-anchor="middle" fill="#8b949e" font-size="9">ReadWriteMany support</text><rect x="435" y="145" width="145" height="45" rx="5" fill="#1a3a2a" stroke="#3fb950" stroke-width="1"/><text x="507" y="165" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">cephfs</text><text x="507" y="183" text-anchor="middle" fill="#8b949e" font-size="9">distributed, RWX</text><rect x="435" y="198" width="145" height="45" rx="5" fill="#1a3a2a" stroke="#3fb950" stroke-width="1"/><text x="507" y="218" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">persistentVolumeClaim</text><text x="507" y="236" text-anchor="middle" fill="#8b949e" font-size="9">references a PVC</text><rect x="615" y="55" width="175" height="310" rx="8" fill="#161b22" stroke="#30363d"/><text x="702" y="80" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">Cloud / CSI</text><rect x="630" y="92" width="145" height="45" rx="5" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1"/><text x="702" y="112" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">csi</text><text x="702" y="130" text-anchor="middle" fill="#8b949e" font-size="9">modern standard driver</text><rect x="630" y="145" width="145" height="45" rx="5" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1"/><text x="702" y="165" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">awsElasticBlockStore</text><text x="702" y="183" text-anchor="middle" fill="#8b949e" font-size="9">deprecated, use CSI</text><rect x="630" y="198" width="145" height="45" rx="5" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1"/><text x="702" y="218" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">gcePersistentDisk</text><text x="702" y="236" text-anchor="middle" fill="#8b949e" font-size="9">deprecated, use CSI</text><text x="410" y="390" text-anchor="middle" fill="#8b949e" font-size="10">All volume types are declared under spec.volumes and mounted via spec.containers[].volumeMounts</text></svg>