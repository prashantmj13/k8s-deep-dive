<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Secrets &#8212; Storing Sensitive Data</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">Base64-encoded in etcd &#8226; Encryption-at-rest is OPTIONAL &#8226; Mount as files for safety</text>

  <!-- Secret object -->
  <g filter="url(#sh)">
    <rect x="60" y="100" width="380" height="240" rx="14" fill="#fee2e2" stroke="#7f1d1d" stroke-width="2"/>
    <text x="80" y="125" font-size="14" font-weight="700" fill="#7f1d1d">Secret &quot;db-creds&quot;</text>
    <text x="80" y="148" font-size="11" font-family="Consolas, monospace" fill="#0f172a">type: Opaque</text>
    <text x="80" y="166" font-size="11" font-family="Consolas, monospace" fill="#0f172a">data:</text>
    <text x="95" y="184" font-size="11" font-family="Consolas, monospace" fill="#0f172a">user: YWRtaW4=          # base64</text>
    <text x="95" y="202" font-size="11" font-family="Consolas, monospace" fill="#0f172a">password: c3VwZXJzZWNyZXQ=</text>
    <text x="80" y="225" font-size="11" font-family="Consolas, monospace" fill="#0f172a"># OR: stringData (auto-encoded)</text>
    <text x="80" y="248" font-size="11" font-family="Consolas, monospace" fill="#0f172a">stringData:</text>
    <text x="95" y="266" font-size="11" font-family="Consolas, monospace" fill="#0f172a">user: admin</text>
    <text x="95" y="284" font-size="11" font-family="Consolas, monospace" fill="#0f172a">password: supersecret</text>
    <text x="80" y="318" font-size="10" fill="#475569" font-style="italic">Stored as base64 in etcd. NOT encrypted by</text>
    <text x="80" y="332" font-size="10" fill="#475569" font-style="italic">default &#8212; configure encryption-at-rest separately.</text>
  </g>

  <!-- Two consumption modes -->
  <text x="800" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Two ways to use it in a pod</text>

  <!-- Env var -->
  <g filter="url(#sh)">
    <rect x="540" y="120" width="290" height="200" rx="10" fill="#fef3c7" stroke="#854d0e" stroke-width="2"/>
    <text x="685" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">As env var</text>
    <text x="560" y="170" font-size="10" font-family="Consolas, monospace" fill="#0f172a">env:</text>
    <text x="575" y="185" font-size="10" font-family="Consolas, monospace" fill="#0f172a">- name: DB_PASS</text>
    <text x="590" y="200" font-size="10" font-family="Consolas, monospace" fill="#0f172a">valueFrom:</text>
    <text x="605" y="214" font-size="10" font-family="Consolas, monospace" fill="#0f172a">secretKeyRef:</text>
    <text x="620" y="228" font-size="10" font-family="Consolas, monospace" fill="#0f172a">name: db-creds</text>
    <text x="620" y="242" font-size="10" font-family="Consolas, monospace" fill="#0f172a">key: password</text>
    <text x="560" y="270" font-size="10" fill="#7f1d1d" font-weight="700">&#9888; Drawbacks:</text>
    <text x="560" y="285" font-size="10" fill="#0f172a">&#8226; visible via printenv inside</text>
    <text x="560" y="300" font-size="10" fill="#0f172a">&#8226; doesn&apos;t auto-update</text>
    <text x="560" y="315" font-size="10" fill="#0f172a">&#8226; risk of accidental logging</text>
  </g>

  <!-- File mount -->
  <g filter="url(#sh)">
    <rect x="850" y="120" width="290" height="200" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <text x="995" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">As mounted file (preferred)</text>
    <text x="870" y="170" font-size="10" font-family="Consolas, monospace" fill="#0f172a">volumeMounts:</text>
    <text x="885" y="184" font-size="10" font-family="Consolas, monospace" fill="#0f172a">- name: creds</text>
    <text x="900" y="198" font-size="10" font-family="Consolas, monospace" fill="#0f172a">mountPath: /etc/db</text>
    <text x="900" y="212" font-size="10" font-family="Consolas, monospace" fill="#0f172a">readOnly: true</text>
    <text x="870" y="230" font-size="10" font-family="Consolas, monospace" fill="#0f172a">volumes:</text>
    <text x="885" y="244" font-size="10" font-family="Consolas, monospace" fill="#0f172a">- name: creds</text>
    <text x="900" y="258" font-size="10" font-family="Consolas, monospace" fill="#0f172a">secret:</text>
    <text x="915" y="272" font-size="10" font-family="Consolas, monospace" fill="#0f172a">secretName: db-creds</text>
    <text x="870" y="295" font-size="10" fill="#14532d" font-weight="700">+ Auto-updates within ~60s</text>
    <text x="870" y="310" font-size="10" fill="#14532d" font-weight="700">+ Stored on tmpfs (RAM)</text>
  </g>

  <!-- Types -->
  <text x="600" y="380" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Built-in Secret types</text>

  <rect x="60" y="395" width="1080" height="40" fill="#1e293b"/>
  <text x="80" y="420" font-size="12" font-weight="700" fill="white">Type</text>
  <text x="380" y="420" font-size="12" font-weight="700" fill="white">Required keys</text>
  <text x="780" y="420" font-size="12" font-weight="700" fill="white">Use case</text>

  <g font-size="11" fill="#0f172a">
    <rect x="60" y="435" width="1080" height="32" fill="#f1f5f9"/>
    <text x="80" y="455" font-family="Consolas, monospace" font-weight="700">Opaque</text>
    <text x="380" y="455">any keys</text>
    <text x="780" y="455">generic; default if not specified</text>

    <rect x="60" y="467" width="1080" height="32" fill="#ffffff"/>
    <text x="80" y="487" font-family="Consolas, monospace" font-weight="700">kubernetes.io/tls</text>
    <text x="380" y="487">tls.crt, tls.key</text>
    <text x="780" y="487">TLS certificates (used by Ingress)</text>

    <rect x="60" y="499" width="1080" height="32" fill="#f1f5f9"/>
    <text x="80" y="519" font-family="Consolas, monospace" font-weight="700">kubernetes.io/dockerconfigjson</text>
    <text x="380" y="519">.dockerconfigjson</text>
    <text x="780" y="519">private registry pull credentials</text>

    <rect x="60" y="531" width="1080" height="32" fill="#ffffff"/>
    <text x="80" y="551" font-family="Consolas, monospace" font-weight="700">kubernetes.io/basic-auth</text>
    <text x="380" y="551">username, password</text>
    <text x="780" y="551">HTTP basic auth credentials</text>

    <rect x="60" y="563" width="1080" height="32" fill="#f1f5f9"/>
    <text x="80" y="583" font-family="Consolas, monospace" font-weight="700">kubernetes.io/ssh-auth</text>
    <text x="380" y="583">ssh-privatekey</text>
    <text x="780" y="583">SSH key for git or remote access</text>

    <rect x="60" y="595" width="1080" height="32" fill="#ffffff"/>
    <text x="80" y="615" font-family="Consolas, monospace" font-weight="700">kubernetes.io/service-account-token</text>
    <text x="380" y="615">token, ca.crt, namespace</text>
    <text x="780" y="615">legacy SA tokens (avoid; use projected)</text>

    <rect x="60" y="627" width="1080" height="32" fill="#f1f5f9"/>
    <text x="80" y="647" font-family="Consolas, monospace" font-weight="700">bootstrap.kubernetes.io/token</text>
    <text x="380" y="647">token-id, token-secret</text>
    <text x="780" y="647">node bootstrap tokens (kubeadm)</text>
  </g>
</svg>
