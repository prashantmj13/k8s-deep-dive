<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Labels &amp; Selectors</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#475569">Labels = key/value tags on objects. Selectors = queries that match labels.</text>

  <!-- Pods with labels -->
  <text x="280" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#78350f">8 Pods (each with labels)</text>

  <g><rect x="80" y="120" width="160" height="60" rx="8" fill="#f59e0b"/><text x="160" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="white">P1</text><text x="160" y="160" text-anchor="middle" font-size="9" fill="#fff7ed">app=web env=prod</text><text x="160" y="172" text-anchor="middle" font-size="9" fill="#fff7ed">tier=frontend</text></g>
  <g><rect x="260" y="120" width="160" height="60" rx="8" fill="#f59e0b"/><text x="340" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="white">P2</text><text x="340" y="160" text-anchor="middle" font-size="9" fill="#fff7ed">app=web env=prod</text><text x="340" y="172" text-anchor="middle" font-size="9" fill="#fff7ed">tier=frontend</text></g>

  <g><rect x="80" y="195" width="160" height="60" rx="8" fill="#f59e0b"/><text x="160" y="217" text-anchor="middle" font-size="11" font-weight="700" fill="white">P3</text><text x="160" y="235" text-anchor="middle" font-size="9" fill="#fff7ed">app=web env=staging</text><text x="160" y="247" text-anchor="middle" font-size="9" fill="#fff7ed">tier=frontend</text></g>
  <g><rect x="260" y="195" width="160" height="60" rx="8" fill="#f59e0b"/><text x="340" y="217" text-anchor="middle" font-size="11" font-weight="700" fill="white">P4</text><text x="340" y="235" text-anchor="middle" font-size="9" fill="#fff7ed">app=web env=prod</text><text x="340" y="247" text-anchor="middle" font-size="9" fill="#fff7ed">tier=backend</text></g>

  <g><rect x="80" y="270" width="160" height="60" rx="8" fill="#f59e0b"/><text x="160" y="292" text-anchor="middle" font-size="11" font-weight="700" fill="white">P5</text><text x="160" y="310" text-anchor="middle" font-size="9" fill="#fff7ed">app=api env=prod</text><text x="160" y="322" text-anchor="middle" font-size="9" fill="#fff7ed">tier=backend</text></g>
  <g><rect x="260" y="270" width="160" height="60" rx="8" fill="#f59e0b"/><text x="340" y="292" text-anchor="middle" font-size="11" font-weight="700" fill="white">P6</text><text x="340" y="310" text-anchor="middle" font-size="9" fill="#fff7ed">app=api env=staging</text><text x="340" y="322" text-anchor="middle" font-size="9" fill="#fff7ed">tier=backend</text></g>

  <g><rect x="80" y="345" width="160" height="60" rx="8" fill="#f59e0b"/><text x="160" y="367" text-anchor="middle" font-size="11" font-weight="700" fill="white">P7</text><text x="160" y="385" text-anchor="middle" font-size="9" fill="#fff7ed">app=db env=prod</text><text x="160" y="397" text-anchor="middle" font-size="9" fill="#fff7ed">tier=data</text></g>
  <g><rect x="260" y="345" width="160" height="60" rx="8" fill="#f59e0b"/><text x="340" y="367" text-anchor="middle" font-size="11" font-weight="700" fill="white">P8</text><text x="340" y="385" text-anchor="middle" font-size="9" fill="#fff7ed">app=db env=staging</text><text x="340" y="397" text-anchor="middle" font-size="9" fill="#fff7ed">tier=data</text></g>

  <!-- Selectors -->
  <text x="780" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Selectors and what they match</text>

  <g filter="url(#sh)">
    <rect x="500" y="120" width="600" height="55" rx="8" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
    <text x="520" y="142" font-size="12" font-family="Consolas, monospace" font-weight="700" fill="#1e3a8a">app=web</text>
    <text x="520" y="160" font-size="11" fill="#0f172a">matches: P1, P2, P3, P4   (3 prod + 1 staging)</text>
  </g>

  <g filter="url(#sh)">
    <rect x="500" y="190" width="600" height="55" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <text x="520" y="212" font-size="12" font-family="Consolas, monospace" font-weight="700" fill="#14532d">app=web,env=prod</text>
    <text x="520" y="230" font-size="11" fill="#0f172a">matches: P1, P2, P4   (commas mean AND)</text>
  </g>

  <g filter="url(#sh)">
    <rect x="500" y="260" width="600" height="55" rx="8" fill="#fef3c7" stroke="#854d0e" stroke-width="2"/>
    <text x="520" y="282" font-size="12" font-family="Consolas, monospace" font-weight="700" fill="#713f12">app in (web, api)</text>
    <text x="520" y="300" font-size="11" fill="#0f172a">matches: P1, P2, P3, P4, P5, P6   (set-based)</text>
  </g>

  <g filter="url(#sh)">
    <rect x="500" y="330" width="600" height="55" rx="8" fill="#fee2e2" stroke="#7f1d1d" stroke-width="2"/>
    <text x="520" y="352" font-size="12" font-family="Consolas, monospace" font-weight="700" fill="#7f1d1d">env!=staging</text>
    <text x="520" y="370" font-size="11" fill="#0f172a">matches: P1, P2, P4, P5, P7   (everything not staging)</text>
  </g>

  <g filter="url(#sh)">
    <rect x="500" y="400" width="600" height="55" rx="8" fill="#ede9fe" stroke="#5b21b6" stroke-width="2"/>
    <text x="520" y="422" font-size="12" font-family="Consolas, monospace" font-weight="700" fill="#3b0764">tier</text>
    <text x="520" y="440" font-size="11" fill="#0f172a">matches: ALL pods (label key tier exists, any value)</text>
  </g>

  <g filter="url(#sh)">
    <rect x="500" y="470" width="600" height="55" rx="8" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
    <text x="520" y="492" font-size="12" font-family="Consolas, monospace" font-weight="700" fill="#155e75">!debug</text>
    <text x="520" y="510" font-size="11" fill="#0f172a">matches: ALL pods (label key debug does NOT exist)</text>
  </g>

  <!-- Where selectors matter -->
  <rect x="60" y="555" width="1080" height="135" rx="14" fill="#fef3c7" stroke="#854d0e" stroke-width="2"/>
  <text x="80" y="582" font-size="14" font-weight="700" fill="#713f12">Where selectors are used (everywhere)</text>
  <text x="80" y="608" font-size="11" fill="#0f172a">&#8226; <tspan font-weight="700">Service</tspan>: routes traffic to pods matching <tspan font-family="Consolas, monospace">spec.selector</tspan></text>
  <text x="80" y="626" font-size="11" fill="#0f172a">&#8226; <tspan font-weight="700">ReplicaSet / Deployment / DaemonSet / StatefulSet</tspan>: owns pods matching <tspan font-family="Consolas, monospace">spec.selector</tspan></text>
  <text x="80" y="644" font-size="11" fill="#0f172a">&#8226; <tspan font-weight="700">NetworkPolicy</tspan>: applies rules to pods matching <tspan font-family="Consolas, monospace">spec.podSelector</tspan> + namespaces matching namespaceSelector</text>
  <text x="80" y="662" font-size="11" fill="#0f172a">&#8226; <tspan font-weight="700">PodAffinity / Anti-Affinity</tspan>: choose nodes based on labels of OTHER pods</text>
  <text x="80" y="680" font-size="11" fill="#0f172a">&#8226; <tspan font-weight="700">kubectl get -l ...</tspan>: ad-hoc filtering and bulk operations</text>
</svg>
