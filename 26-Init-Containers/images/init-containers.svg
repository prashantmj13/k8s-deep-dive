<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <rect width="800" height="400" fill="#0d1117"/>
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="bold">Init Container Execution Flow</text>

  <!-- Pod box -->
  <rect x="30" y="60" width="740" height="300" rx="10" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="50" y="85" fill="#8b949e" font-size="12">Pod</text>

  <!-- Init Container 1 -->
  <rect x="60" y="100" width="160" height="80" rx="8" fill="#1f3a5f" stroke="#58a6ff" stroke-width="2"/>
  <text x="140" y="135" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">Init Container 1</text>
  <text x="140" y="155" text-anchor="middle" fill="#8b949e" font-size="11">wait-for-db</text>
  <text x="140" y="172" text-anchor="middle" fill="#3fb950" font-size="10">exit 0 ✓</text>

  <!-- Arrow 1 -->
  <line x1="220" y1="140" x2="270" y2="140" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="245" y="132" text-anchor="middle" fill="#8b949e" font-size="10">success</text>

  <!-- Init Container 2 -->
  <rect x="270" y="100" width="160" height="80" rx="8" fill="#1f3a5f" stroke="#58a6ff" stroke-width="2"/>
  <text x="350" y="135" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">Init Container 2</text>
  <text x="350" y="155" text-anchor="middle" fill="#8b949e" font-size="11">init-config</text>
  <text x="350" y="172" text-anchor="middle" fill="#3fb950" font-size="10">exit 0 ✓</text>

  <!-- Arrow 2 -->
  <line x1="430" y1="140" x2="480" y2="140" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="455" y="132" text-anchor="middle" fill="#8b949e" font-size="10">success</text>

  <!-- Init Container 3 -->
  <rect x="480" y="100" width="160" height="80" rx="8" fill="#1f3a5f" stroke="#58a6ff" stroke-width="2"/>
  <text x="560" y="135" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">Init Container 3</text>
  <text x="560" y="155" text-anchor="middle" fill="#8b949e" font-size="11">run-migrations</text>
  <text x="560" y="172" text-anchor="middle" fill="#3fb950" font-size="10">exit 0 ✓</text>

  <!-- Arrow 3 -->
  <line x1="640" y1="140" x2="690" y2="140" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="665" y="132" text-anchor="middle" fill="#8b949e" font-size="10">all done</text>

  <!-- App Container -->
  <rect x="640" y="100" width="110" height="80" rx="8" fill="#1a3a2a" stroke="#3fb950" stroke-width="2"/>
  <text x="695" y="130" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">App</text>
  <text x="695" y="148" text-anchor="middle" fill="#8b949e" font-size="11">Container</text>
  <text x="695" y="166" text-anchor="middle" fill="#3fb950" font-size="10">▶ Running</text>

  <!-- Failure path -->
  <rect x="270" y="230" width="160" height="80" rx="8" fill="#3a1a1a" stroke="#f85149" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="350" y="263" text-anchor="middle" fill="#f85149" font-size="13" font-weight="bold">Init Fails?</text>
  <text x="350" y="283" text-anchor="middle" fill="#8b949e" font-size="11">exit 1</text>
  <text x="350" y="300" text-anchor="middle" fill="#f85149" font-size="10">CrashLoopBackOff</text>

  <line x1="350" y1="180" x2="350" y2="230" stroke="#f85149" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
  <text x="363" y="210" fill="#f85149" font-size="10">on failure</text>

  <!-- Restart arrow -->
  <path d="M 270 270 Q 140 270 140 180" fill="none" stroke="#f85149" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
  <text x="155" y="268" fill="#f85149" font-size="10">restart from</text>
  <text x="155" y="280" fill="#f85149" font-size="10">beginning</text>

  <!-- Shared volume -->
  <rect x="200" y="330" width="400" height="30" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="350" text-anchor="middle" fill="#8b949e" font-size="11">📦 Shared emptyDir Volume — accessible by all init + app containers</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f85149"/>
    </marker>
  </defs>
</svg>
